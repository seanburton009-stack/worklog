<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dräger WorkLog V21</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --primary: #003366; 
            --secondary: #005eb8; 
            --bg: #f4f7f9; 
            --danger: #d9534f; 
            --success: #28a745;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        
        /* INTERFACE APPLI */
        #login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .box { background: white; padding: 35px; border-radius: 24px; width: 85%; max-width: 340px; text-align: center; shadow: var(--shadow); }
        .container { padding: 20px 15px 120px 15px; max-width: 650px; margin: auto; display: none; }
        
        .card { background: white; border-radius: 18px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.03); }
        
        label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.85em; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { width: 100%; padding: 14px; border: 1.5px solid #e1e8ed; border-radius: 12px; font-size: 16px; margin-bottom: 15px; transition: border 0.3s; }
        input:focus { border-color: var(--secondary); outline: none; }
        
        .check-row { background: #f8fafc; padding: 15px; border-radius: 14px; border: 1px dashed #cbd5e1; margin-bottom: 20px; }
        .check-item { display: flex; align-items: center; cursor: pointer; padding: 8px 0; }
        .check-item input { width: 22px; height: 22px; margin-right: 12px; margin-bottom: 0; accent-color: var(--secondary); }

        .btn-main { 
            width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; padding: 18px; border: none; border-radius: 14px; font-weight: 700; 
            font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 94, 184, 0.3);
            transition: transform 0.2s;
        }
        .btn-main:active { transform: scale(0.98); }

        .info-week { background: white; border-left: 5px solid var(--primary); padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: var(--shadow); }
        .info-week span { font-size: 0.8em; color: #64748b; font-weight: 600; }
        .info-week b { font-size: 1.8em; color: var(--primary); display: block; }

        .tabs { display: flex; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); position: fixed; bottom: 0; left: 0; right: 0; padding: 12px; border-top: 1px solid #e1e8ed; z-index: 1000; }
        .tab { flex: 1; border: none; background: none; font-size: 11px; color: #94a3b8; text-align: center; transition: 0.3s; }
        .tab.active { color: var(--secondary); font-weight: 800; }

        .stat-banner { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 15px; border-radius: 18px; text-align: center; box-shadow: var(--shadow); border-bottom: 4px solid transparent; }
        .stat-box.balance { border-bottom-color: var(--secondary); }
        .stat-box.conges { border-bottom-color: var(--success); }
        .stat-box span { font-size: 0.75em; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .stat-box b { display: block; font-size: 1.5em; margin-top: 5px; color: #1e293b; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: center; padding: 12px 5px; color: #64748b; font-size: 0.8em; border-bottom: 2px solid #f1f5f9; }
        td { padding: 14px 5px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 0.85em; }
        .weekend { background: #fcfcfc; color: #cbd5e1; }

        /* PDF & PRINT */
        #print-header { display: none; }
        @media print {
            .tabs, .export-bar, .filter-row, .stat-banner, .btn-main, .delete-col, #login-overlay, .info-week, .btn-exp { display: none !important; }
            body { background: white; }
            .container { display: block !important; padding: 0; width: 100%; }
            .card { box-shadow: none; border: none; padding: 0; }
            #print-header { display: block; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
            #print-header h1 { font-size: 22px; margin: 0; }
            #print-header p { font-size: 14px; margin: 4px 0; }
            table { border: 1px solid #ddd; }
            th { background: #f8fafc !important; color: black !important; border: 1px solid #ddd; }
            td { border: 1px solid #ddd; }
            .print-footer { margin-top: 30px; border-top: 1px solid #000; padding-top: 10px; text-align: right; font-size: 14px; font-weight: bold; }
        }
    </style>
</head>
<body onload="initApp()">

<div id="print-header">
    <h1>Burton, Sean</h1>
    <p>Service Engineer - Logistic Support RSS</p>
    <p style="font-weight:bold; margin-top:15px;" id="pdf-month-title">Résumé du mois</p>
</div>

<div id="login-overlay">
    <div class="box">
        <h2 style="color:white; margin-bottom:20px;">Dräger RSS</h2>
        <input type="text" id="userInput" placeholder="Utilisateur">
        <input type="password" id="userPin" maxlength="4" placeholder="PIN">
        <button class="btn-main" onclick="handleAuth()">Se connecter</button>
    </div>
</div>

<div class="container" id="mainContainer">
    <div id="saisie" class="content active">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
             <button onclick="softLogout()" style="border:none; background:none; color:#64748b; font-weight:bold;">Déconnexion</button>
             <button class="btn-lang" onclick="toggleLang()" style="border:none; background:var(--primary); color:white; padding:8px 12px; border-radius:10px;">🌐 FR/NL</button>
        </div>
        <div class="info-week">
            <span id="txt-rem-label">Reste à prester (Semaine)</span>
            <b id="stat-remaining-ptr">--h--</b>
        </div>
        <div class="card">
            <label id="txt-lbl-date">Date de prestation</label>
            <input type="date" id="dateInput">
            <div style="display:flex; gap:15px;">
                <div style="flex:1;"><label id="txt-lbl-start">Début</label><input type="time" id="startTime" value="08:00"></div>
                <div style="flex:1;"><label id="txt-lbl-end">Fin</label><input type="time" id="endTime" value="16:30"></div>
            </div>
            <div class="check-row">
                <div class="check-item" onclick="document.getElementById('homeStart').click()">
                    <input type="checkbox" id="homeStart" onclick="event.stopPropagation()">
                    <label id="txt-lbl-hs">Départ Domicile (+30m)</label>
                </div>
                <div class="check-item" onclick="document.getElementById('homeEnd').click()">
                    <input type="checkbox" id="homeEnd" onclick="event.stopPropagation()">
                    <label id="txt-lbl-he">Retour Domicile (+30m)</label>
                </div>
            </div>
            <label id="txt-lbl-loc">Lieu d'intervention</label>
            <select id="location">
                <option value="Wemmel">Wemmel (-45m pause)</option>
                <option value="Client">Client (-30m pause)</option>
                <option value="INEOS">INEOS (-30m pause)</option>
                <option value="Esso">Esso (-30m pause)</option>
            </select>
            <button class="btn-main" id="txt-btn-save" onclick="saveData()">Enregistrer la journée</button>
        </div>
    </div>

    <div id="historique" class="content" style="display:none;">
        <div style="margin-bottom:20px;">
            <button class="btn-main" id="txt-btn-print" onclick="window.print()" style="background:var(--primary);">🖨️ Générer le rapport PDF</button>
        </div>
        <div class="stat-banner">
            <div class="stat-box balance"><span id="txt-stat-bal">Balance Mois</span><b id="stat-balance" style="color:var(--secondary);">--</b></div>
            <div class="stat-box conges"><span id="txt-stat-con">Congés Restants</span><b id="stat-conges" style="color:var(--success);">28</b></div>
        </div>
        <div class="card">
            <div class="filter-row">
                <select id="selectMonth" onchange="renderTable()"></select>
                <select id="selectYear" onchange="renderTable()"></select>
            </div>
            <table>
                <thead>
                    <tr id="txt-table-head">
                        <th>Date</th>
                        <th style="text-align:left;">Détails</th>
                        <th>Réel</th>
                        <th>+/-</th>
                        <th class="delete-col"></th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="print-footer" id="pdf-totals"></div>
        </div>
    </div>
</div>

<nav class="tabs">
    <button class="tab active" id="txt-nav-ptr" onclick="openTab('saisie', this)">➕ POINTER</button>
    <button class="tab" id="txt-nav-cal" onclick="openTab('historique', this)">📅 CALENDRIER</button>
</nav>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBPC6cJgFwBrSOppxE_kQDA2gs1ioEvGCw", authDomain: "worklog-fc54b.firebaseapp.com", databaseURL: "https://worklog-fc54b-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "worklog-fc54b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let entries = [];
    let currentUserId = "";
    let lang = localStorage.getItem('lang') || 'fr';

    const ui = {
        fr: {
            rem_label: "Reste à prester cette semaine", lbl_date: "Date", lbl_start: "Arrivée", lbl_end: "Départ", 
            lbl_hs: "Départ Maison (+30m)", lbl_he: "Retour Maison (+30m)", lbl_loc: "Lieu", 
            btn_save: "Enregistrer la journée", btn_print: "🖨️ Générer le rapport PDF", stat_bal: "Balance Mensuelle",
            stat_con: "Congés Restants", nav_ptr: "➕ POINTER", nav_cal: "📅 CALENDRIER", 
            table_head: "<th>Date</th><th style='text-align:left;'>Détails</th><th>Réel</th><th>+/-</th><th class='delete-col'></th>",
            pdf_res: "Résumé des prestations - ", pdf_total: "Total Heures Site", pdf_supp: "Total Overtime",
            save_ok: "Données enregistrées !", del_confirm: "Supprimer cette entrée ?", confirm_calc: "Total net : {t} - Confirmer ?"
        },
        nl: {
            rem_label: "Nog te presteren deze week", lbl_date: "Datum", lbl_start: "Aankomst", lbl_end: "Vertrek", 
            lbl_hs: "Vertrek Huis (+30m)", lbl_he: "Terug Huis (+30m)", lbl_loc: "Locatie", 
            btn_save: "Dag opslaan", btn_print: "🖨️ PDF-rapport genereren", stat_bal: "Maandelijkse Balans",
            stat_con: "Resterend Verlof", nav_ptr: "➕ INVOER", nav_cal: "📅 KALENDER", 
            table_head: "<th>Datum</th><th style='text-align:left;'>Details</th><th>Echt</th><th>+/-</th><th class='delete-col'></th>",
            pdf_res: "Overzicht van prestaties - ", pdf_total: "Totaal Uren Site", pdf_supp: "Totaal Overtime",
            save_ok: "Gegevens opgeslagen!", del_confirm: "Verwijderen ?", confirm_calc: "Netto totaal : {t} - Bevestigen ?"
        }
    };

    function translateUI() {
        const t = ui[lang];
        document.getElementById('txt-rem-label').innerText = t.rem_label;
        document.getElementById('txt-lbl-date').innerText = t.lbl_date;
        document.getElementById('txt-lbl-start').innerText = t.lbl_start;
        document.getElementById('txt-lbl-end').innerText = t.lbl_end;
        document.getElementById('txt-lbl-hs').innerText = t.lbl_hs;
        document.getElementById('txt-lbl-he').innerText = t.lbl_he;
        document.getElementById('txt-lbl-loc').innerText = t.lbl_loc;
        document.getElementById('txt-btn-save').innerText = t.btn_save;
        document.getElementById('txt-btn-print').innerText = t.btn_print;
        document.getElementById('txt-stat-bal').innerText = t.stat_bal;
        document.getElementById('txt-stat-con').innerText = t.stat_con;
        document.getElementById('txt-nav-ptr').innerText = t.nav_ptr;
        document.getElementById('txt-nav-cal').innerText = t.nav_cal;
        document.getElementById('txt-table-head').innerHTML = t.table_head;
        updateMonthAndYearSelectors();
    }

    function initApp() {
        const last = localStorage.getItem('lastLoggedUser');
        if(last) document.getElementById('userInput').value = last;
        document.getElementById('dateInput').valueAsDate = new Date();
        translateUI();
    }

    function handleAuth() {
        const u = document.getElementById('userInput').value.trim().toLowerCase();
        if(!u) return;
        currentUserId = u;
        localStorage.setItem('lastLoggedUser', u);
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('mainContainer').style.display = 'block';
        loadData();
    }

    function loadData() {
        db.ref('users/' + currentUserId + '/entries').on('value', (snap) => {
            entries = snap.val() ? Object.values(snap.val()) : [];
            renderTable();
        });
    }

    async function saveData() {
        const dateStr = document.getElementById('dateInput').value;
        if(!dateStr) return;
        const sTime = document.getElementById('startTime').value;
        const eTime = document.getElementById('endTime').value;
        const [h1, m1] = sTime.split(':').map(Number);
        const [h2, m2] = eTime.split(':').map(Number);
        const loc = document.getElementById('location').value;
        const isHS = document.getElementById('homeStart').checked;
        const isHE = document.getElementById('homeEnd').checked;

        let finalMin = (h2 * 60 + m2) - (h1 * 60 + m1) - (loc === "Wemmel" ? 45 : 30) - (isHS ? 30 : 0) - (isHE ? 30 : 0);

        if(confirm(ui[lang].confirm_calc.replace('{t}', formatT(finalMin)))) {
            const key = dateStr.replace(/-/g, '');
            await db.ref('users/'+currentUserId+'/entries/'+key).set({
                date: dateStr, location: loc, minutes: finalMin, homeS: isHS, homeE: isHE, start: sTime, end: eTime
            });
            alert(ui[lang].save_ok);
        }
    }

    function renderTable() {
        const selMonth = parseInt(document.getElementById('selectMonth').value || new Date().getMonth());
        const selYear = parseInt(document.getElementById('selectYear').value || new Date().getFullYear());
        const tBody = document.getElementById('tableBody'); tBody.innerHTML = '';
        let totalMonthMin = 0; let totalSuppMin = 0; let weekWork = 0;
        
        const now = new Date();
        const curMon = new Date(now); curMon.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
        curMon.setHours(0,0,0,0);
        const curSun = new Date(curMon); curSun.setDate(curMon.getDate() + 6);

        const mNames = lang === 'fr' ? ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"] : ["Januari", "Februari", "Maart", "April", "Mei", "Juni", "Juli", "Augustus", "September", "Oktober", "November", "December"];
        document.getElementById('pdf-month-title').innerText = `${ui[lang].pdf_res} ${mNames[selMonth]} ${selYear}`;

        const days = new Date(selYear, selMonth + 1, 0).getDate();
        for (let i = 1; i <= days; i++) {
            const dStr = `${selYear}-${String(selMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const dObj = new Date(selYear, selMonth, i);
            const e = entries.find(x => x.date === dStr);
            const dayIdx = dObj.getDay(); 
            let goal = (dayIdx >= 1 && dayIdx <= 4) ? 480 : (dayIdx === 5 ? 420 : 0);
            let diff = e ? e.minutes - goal : 0;
            
            if(e) { 
                totalMonthMin += e.minutes;
                totalSuppMin += diff;
                if(dObj >= curMon && dObj <= curSun) weekWork += e.minutes;
            }
            const isWE = (dayIdx === 0 || dayIdx === 6);
            const dateFormatted = `${String(i).padStart(2,'0')}/${String(selMonth+1).padStart(2,'0')}/${selYear}`;
            
            let displayRange = '';
            if(e && e.start && e.end) {
                let [h1, m1] = e.start.split(':').map(Number);
                let [h2, m2] = e.end.split(':').map(Number);
                let workStartMin = (h1 * 60 + m1) + (e.homeS ? 30 : 0);
                let workEndMin = (h2 * 60 + m2) - (e.homeE ? 30 : 0);
                displayRange = ` <span style="color:#94a3b8; font-size:0.9em;">(${Math.floor(workStartMin/60).toString().padStart(2,'0')}:${(workStartMin%60).toString().padStart(2,'0')} - ${Math.floor(workEndMin/60).toString().padStart(2,'0')}:${(workEndMin%60).toString().padStart(2,'0')})</span>`;
            }
            
            tBody.innerHTML += `<tr class="${isWE ? 'weekend' : ''}">
                <td style="font-weight:600;">${dateFormatted}</td>
                <td style="text-align:left;">${e ? e.location + displayRange : ''}</td>
                <td style="font-weight:700;">${e ? formatT(e.minutes) : ''}</td>
                <td style="color:${diff >= 0 ? 'var(--success)' : 'var(--danger)'}; font-weight:700;">${e ? formatT(diff) : ''}</td>
                <td class="delete-col">${e ? `<span onclick="deleteEntry('${e.date}')" style="cursor:pointer; font-size:1.2em;">🗑️</span>` : ''}</td>
            </tr>`;
        }
        
        document.getElementById('stat-remaining-ptr').innerText = (2340 - weekWork) <= 0 ? "Objectif Atteint ✅" : formatT(2340 - weekWork);
        document.getElementById('stat-balance').innerText = formatT(totalSuppMin);
        document.getElementById('pdf-totals').innerHTML = `<div style="padding:15px; background:#f8fafc; border-radius:12px;">${ui[lang].pdf_total}: <b>${formatT(totalMonthMin)}</b> | ${ui[lang].pdf_supp}: <b>${formatT(totalSuppMin)}</b></div>`;
    }

    async function deleteEntry(dateKey) {
        if(confirm(ui[lang].del_confirm)) {
            await db.ref('users/'+currentUserId+'/entries/'+dateKey.replace(/-/g, '')).remove();
        }
    }

    function formatT(min) {
        const h = Math.floor(Math.abs(min)/60);
        const m = Math.round(Math.abs(min)%60);
        return `${min < 0 ? '-' : ''}${h}h${m.toString().padStart(2, '0')}`;
    }

    function openTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).style.display = 'block'; btn.classList.add('active');
    }
    
    function softLogout() { document.getElementById('mainContainer').style.display='none'; document.getElementById('login-overlay').style.display='flex'; }

    function updateMonthAndYearSelectors() {
        const mFr = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
        const mNl = ["Januari", "Februari", "Maart", "April", "Mei", "Juni", "Juli", "Augustus", "September", "Oktober", "November", "December"];
        const mSel = document.getElementById('selectMonth');
        const currentM = mSel.value || new Date().getMonth();
        mSel.innerHTML = '';
        (lang === 'fr' ? mFr : mNl).forEach((n, i) => mSel.innerHTML += `<option value="${i}" ${i==currentM?'selected':''}>${n}</option>`);

        const ySel = document.getElementById('selectYear');
        const currentY = parseInt(ySel.value) || new Date().getFullYear();
        ySel.innerHTML = '';
        for(let y = 2020; y <= 2100; y++) ySel.innerHTML += `<option value="${y}" ${y==currentY?'selected':''}>${y}</option>`;
    }

    window.toggleLang = function() {
        lang = (lang === 'fr' ? 'nl' : 'fr');
        localStorage.setItem('lang', lang);
        translateUI();
        renderTable();
    }
</script>
</body>
</html>
