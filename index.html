<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dräger WorkLog V53 - Officiel</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #003366; --secondary: #005eb8; --bg: #f4f7f9; --danger: #d9534f; --emerald: #2ecc71; --shadow: 0 4px 12px rgba(0,0,0,0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; color: #333; }
        
        #login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .box { background: white; padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; }
        
        .container { padding: 10px 15px 140px 15px; max-width: 800px; margin: auto; display: none; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
        
        input, select { width: 100%; padding: 14px; border: 1.5px solid #e1e8ed; border-radius: 12px; font-size: 16px; margin-bottom: 15px; display: block; background: #fff; }
        label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 0.75em; color: var(--primary); text-transform: uppercase; text-align: left; }

        .btn-main { width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 18px; border: none; border-radius: 16px; font-weight: 700; font-size: 1.1em; cursor: pointer; margin-bottom: 10px; }
        
        .info-week { background: white; border-top: 6px solid var(--primary); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; box-shadow: var(--shadow); display: flex; justify-content: space-around; align-items: center; }
        .info-item { flex: 1; }
        .info-item span { font-size: 0.7em; font-weight: bold; color: #64748b; text-transform: uppercase; }
        .info-item b { font-size: 1.5em; color: var(--primary); display: block; }

        .tabs { display: flex; background: white; position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 10px calc(10px + env(safe-area-inset-bottom)) 10px; border-top: 1px solid #e1e8ed; z-index: 1000; }
        .tab { flex: 1; border: none; background: none; font-size: 10px; color: #94a3b8; text-align: center; font-weight: 700; position: relative; }
        .tab.active { color: var(--secondary); }
        .tab-icon { font-size: 20px; display: block; margin-bottom: 3px; }
        .badge { position: absolute; top: -5px; right: 25%; background: var(--danger); color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; display: none; border: 2px solid white; }

        .sub-tabs { display: flex; gap: 10px; margin-bottom: 20px; background: #e2e8f0; padding: 5px; border-radius: 15px; }
        .sub-tab { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 800; font-size: 0.85em; }
        .sub-tab.active { background: white; color: var(--primary); }

        table { width: 100%; border-collapse: collapse; font-size: 0.75em; table-layout: fixed; }
        th { padding: 10px 4px; color: #64748b; border-bottom: 2px solid #f1f5f9; text-transform: uppercase; text-align: center; }
        td { padding: 12px 4px; border-bottom: 1px solid #f1f5f9; text-align: center; vertical-align: middle; }
        .weekend { background: #f8fafc !important; }

        .toggle-container { background: #f0f7ff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #d0e3ff; }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        @media print {
            .tabs, .btn-main, .sub-tabs, #login-overlay, .delete-col, #form-work, #form-vacation, select, input { display: none !important; }
            .container { display: block !important; padding: 0; width: 100%; }
            #pdf-header { display: block !important; border-bottom: 2.5px solid black; margin-bottom: 20px; padding-bottom: 10px; }
        }
    </style>
</head>
<body onload="initApp()">

<div id="login-overlay">
    <div class="box" id="auth-login">
        <h2 style="color:var(--primary);">Dräger RSS</h2>
        <input type="text" id="loginUser" placeholder="User">
        <input type="password" id="loginPin" maxlength="4" placeholder="PIN" inputmode="numeric">
        <button class="btn-main" onclick="handleAuth()">LOGIN</button>
        <div style="margin-top:15px;"><a onclick="showAuth('register')" style="color:var(--secondary); cursor:pointer;">+ Account</a></div>
    </div>
    <div class="box" id="auth-register" style="display:none;">
        <h2>Inscriptions</h2>
        <input type="text" id="regNom" placeholder="NOM">
        <input type="text" id="regPrenom" placeholder="Prénom">
        <input type="text" id="regUser" placeholder="User">
        <input type="password" id="regPin" maxlength="4" placeholder="PIN" inputmode="numeric">
        <button class="btn-main" onclick="handleRegister()">VALIDER</button>
        <button class="btn-main" style="background:#ccc; margin-top:10px;" onclick="showAuth('login')">RETOUR</button>
    </div>
</div>

<div class="container" id="mainContainer">
    <div id="pdf-header" style="display:none;">
        <h1 id="print-name">--</h1>
        <p>Service Engineer - Logistic Support RSS</p>
        <p style="font-weight:bold; margin-top:10px;">Résumé Mensuel des Prestations</p>
    </div>

    <div id="saisie" class="content active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b id="welcome-msg" style="color:var(--primary)">...</b>
            <button onclick="location.reload()" style="color:var(--danger); border:none; background:none; font-weight:bold;">🚪 Déconnexion</button>
        </div>

        <div class="sub-tabs">
            <button class="sub-tab active" id="btn-w" onclick="switchSubTab('work')">HEURES</button>
            <button class="sub-tab" id="btn-v" onclick="switchSubTab('vacation')">CONGÉS</button>
        </div>

        <div id="form-work">
            <div class="info-week">
                <div class="info-item"><span>Reste Semaine</span><b id="stat-remaining-week">39h00</b></div>
                <div class="info-item" style="border-left: 1px solid #eee;"><span>Solde Congés</span><b id="vac-balance">28 j</b></div>
            </div>
            <div class="card">
                <label>Date</label><input type="date" id="dateInput">
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;"><label>Départ Maison/Site</label><input type="time" id="startTime" value="08:00"></div>
                    <div style="flex:1;"><label>Retour Maison/Site</label><input type="time" id="endTime" value="16:30"></div>
                </div>
                <label>Lieu</label>
                <select id="location"><option>Wemmel</option><option>Client</option><option>INEOS</option><option>Esso</option></select>
                
                <div class="toggle-container">
                    <div class="toggle-row"><span>Départ de la maison ? (-30m)</span><input type="checkbox" id="startHome" style="width:22px; height:22px;"></div>
                    <div class="toggle-row"><span>Retour à la maison ? (-30m)</span><input type="checkbox" id="endHome" style="width:22px; height:22px;"></div>
                </div>

                <button class="btn-main" onclick="saveData()">ENREGISTRER PRESTATION</button>
            </div>
        </div>

        <div id="form-vacation" style="display:none;">
            <div class="card">
                <label>Type de congé</label>
                <select id="vacCategory"><option>Congés légaux</option><option>Jour férié</option><option>Malade</option><option>Récupération</option></select>
                <label>Du</label><input type="date" id="vacStart">
                <label>Au</label><input type="date" id="vacEnd">
                <button class="btn-main" onclick="saveVacation()">ENREGISTRER CONGÉS</button>
            </div>
        </div>
    </div>

    <div id="historique" class="content" style="display:none;">
        <div class="card">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <select id="selectMonth" onchange="renderTable()"></select>
                <select id="selectYear" onchange="renderTable()"></select>
            </div>
            <table>
                <thead>
                    <tr><th style="width:15%">Date</th><th style="width:50%">Lieu (H)</th><th style="width:15%">Réel</th><th style="width:10%">+/-</th><th class="delete-col" style="width:10%"></th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div class="card" style="border-top: 4px solid var(--primary); display:flex; justify-content:space-between; font-weight:bold;">
            <span>Total: <span id="total-month-work">0h00</span></span>
            <span>+/- : <span id="total-month-diff">0h00</span></span>
        </div>
        <button class="btn-main" onclick="window.print()">🖨️ GÉNÉRER PDF</button>
        <button class="btn-main" style="background:var(--emerald);" onclick="sendEmail()">📧 ENVOYER RECAP EXCEL</button>
    </div>

    <div id="admin" class="content" style="display:none;">
        <div class="card">
            <h3 style="color:var(--primary);">Gestion Admin</h3>
            <div id="user-list"></div>
        </div>
    </div>
</div>

<nav class="tabs">
    <button class="tab active" onclick="openTab('saisie', this)"><span class="tab-icon">➕</span>POINTAGE</button>
    <button class="tab" onclick="openTab('historique', this)"><span class="tab-icon">📅</span>TABLEAU</button>
    <button class="tab" id="nav-admin" style="display:none;" onclick="openTab('admin', this)">
        <span class="tab-icon">⚙️</span>ADMIN
        <div id="notif-badge" class="badge">0</div>
    </button>
</nav>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBPC6cJgFwBrSOppxE_kQDA2gs1ioEvGCw", authDomain: "worklog-fc54b.firebaseapp.com", databaseURL: "https://worklog-fc54b-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "worklog-fc54b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let user = null, entries = [];

    function handleAuth() {
        const uId = document.getElementById('loginUser').value.trim().toLowerCase();
        const pin = document.getElementById('loginPin').value;
        db.ref('users/' + uId).once('value', snap => {
            const d = snap.val();
            if (d && d.pin === pin) {
                if (!d.active && d.role !== 'admin') return alert("Validation requise.");
                user = { id: uId, ...d };
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'block';
                document.getElementById('welcome-msg').innerText = "Salut " + user.prenom;
                document.getElementById('print-name').innerText = user.nom + " " + user.prenom;
                if(user.role === 'admin') { document.getElementById('nav-admin').style.display = 'block'; loadAdminList(); }
                syncData();
            } else alert("Identifiants incorrects.");
        });
    }

    async function saveData() {
        const d = document.getElementById('dateInput').value;
        const s = document.getElementById('startTime').value, e = document.getElementById('endTime').value, l = document.getElementById('location').value;
        const sH = document.getElementById('startHome').checked, eH = document.getElementById('endHome').checked;
        if(!d) return alert("Choisissez une date.");

        const [h1, m1] = s.split(':').map(Number), [h2, m2] = e.split(':').map(Number);
        let totalMinutes = (h2 * 60 + m2) - (h1 * 60 + m1);

        // Déduction Pause Fixe
        totalMinutes -= (l === "Wemmel" ? 45 : 30);
        
        // Logique Trajet Maison : -30m par trajet coché
        if(sH) totalMinutes -= 30;
        if(eH) totalMinutes -= 30;

        await db.ref('users/'+user.id+'/entries/'+d.replace(/-/g, '')).set({ 
            date: d, location: l, minutes: totalMinutes, start: s, end: e, isVacation: false 
        });
        alert("Pointage enregistré !");
    }

    async function saveVacation() {
        const sD = new Date(document.getElementById('vacStart').value), eD = new Date(document.getElementById('vacEnd').value);
        let curr = new Date(sD);
        while(curr <= eD) {
            if(curr.getDay() !== 0 && curr.getDay() !== 6) {
                const ds = curr.toISOString().split('T')[0];
                const goal = (curr.getDay() === 5 ? 420 : 480);
                await db.ref('users/'+user.id+'/entries/'+ds.replace(/-/g, '')).set({ 
                    date: ds, location: document.getElementById('vacCategory').value, minutes: goal, start: "N/A", end: "N/A", isVacation: true 
                });
            }
            curr.setDate(curr.getDate() + 1);
        }
        alert("Congés enregistrés !");
    }

    function renderTable() {
        const m = parseInt(document.getElementById('selectMonth').value), y = parseInt(document.getElementById('selectYear').value);
        const tBody = document.getElementById('tableBody'); tBody.innerHTML = '';
        let totalM = 0, totalD = 0, vacUsed = 0;
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        
        // Calcul solde global (sur toutes les entrées, pas juste le mois)
        entries.forEach(e => { if(e.isVacation && e.location === "Congés légaux") vacUsed++; });
        document.getElementById('vac-balance').innerText = (28 - vacUsed) + " j";

        for (let i = 1; i <= daysInMonth; i++) {
            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const dobj = new Date(y, m, i);
            const e = entries.find(x => x.date === ds);
            const goal = (dobj.getDay() >= 1 && dobj.getDay() <= 4) ? 480 : (dobj.getDay() === 5 ? 420 : 0);
            
            if(e) { totalM += e.minutes; totalD += (e.minutes - goal); }

            tBody.innerHTML += `<tr class="${(dobj.getDay()==0||dobj.getDay()==6)?'weekend':''}">
                <td style="font-weight:bold">${i}/${m+1}</td>
                <td>${e ? e.location + (e.start !== 'N/A' ? ' ('+e.start+'-'+e.end+')' : '') : ''}</td>
                <td>${e ? formatT(e.minutes) : ''}</td>
                <td style="color:${(e && e.minutes-goal>=0)?'green':'red'}">${e ? formatT(e.minutes-goal) : ''}</td>
                <td class="delete-col">${e ? `<span onclick="deleteEntry('${e.date}')" style="cursor:pointer">🗑️</span>` : ''}</td>
            </tr>`;
        }
        document.getElementById('total-month-work').innerText = formatT(totalM);
        document.getElementById('total-month-diff').innerText = formatT(totalD);
        updateWeeklyStats();
    }

    function updateWeeklyStats() {
        const now = new Date();
        const startWeek = new Date(now); startWeek.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
        startWeek.setHours(0,0,0,0);
        let weekWork = 0;
        entries.forEach(e => { if(new Date(e.date) >= startWeek && !e.isVacation) weekWork += e.minutes; });
        const rem = 2340 - weekWork;
        document.getElementById('stat-remaining-week').innerText = rem <= 0 ? "OK" : formatT(rem);
    }

    function loadAdminList() {
        db.ref('users').on('value', snap => {
            const all = snap.val(); const list = document.getElementById('user-list'); 
            list.innerHTML = ""; let pending = 0;
            for(let id in all) {
                const u = all[id]; if(!u.active) pending++;
                list.innerHTML += `<div style="padding:15px; border-bottom:1px solid #eee; text-align:left;">
                    <b>${u.nom} ${u.prenom}</b> (${u.role})
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        ${!u.active ? `<button onclick="db.ref('users/${id}/active').set(true)" style="background:var(--emerald); color:white; border:none; padding:8px; border-radius:8px;">Valider</button>` : ''}
                        <button onclick="db.ref('users/${id}/role').set('${u.role==='admin'?'user':'admin'}')" style="background:var(--secondary); color:white; border:none; padding:8px; border-radius:8px;">Rôle</button>
                        <button onclick="if(confirm('Supprimer?')) db.ref('users/${id}').remove()" style="background:var(--danger); color:white; border:none; padding:8px; border-radius:8px;">🗑️</button>
                    </div></div>`;
            }
            document.getElementById('notif-badge').innerText = pending;
            document.getElementById('notif-badge').style.display = pending > 0 ? 'block' : 'none';
        });
    }

    function sendEmail() {
        const mLabel = document.getElementById('selectMonth').options[document.getElementById('selectMonth').selectedIndex].text;
        let mailBody = `PRESTATIONS - ${user.nom} ${user.prenom}\nPERIODE : ${mLabel}\n\nDATE\tLIEU\tREEL\tDIFF\n`;
        const m = parseInt(document.getElementById('selectMonth').value), y = parseInt(document.getElementById('selectYear').value);
        for (let i = 1; i <= new Date(y, m + 1, 0).getDate(); i++) {
            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const e = entries.find(x => x.date === ds);
            const goal = (new Date(y, m, i).getDay() >= 1 && new Date(y, m, i).getDay() <= 4) ? 480 : 420;
            if(e) mailBody += `${i}/${m+1}\t${e.location}\t${formatT(e.minutes)}\t${formatT(e.minutes-goal)}\n`;
        }
        window.location.href = `mailto:?subject=WorkLog ${mLabel}&body=${encodeURIComponent(mailBody)}`;
    }

    function syncData() { db.ref('users/' + user.id + '/entries').on('value', snap => { entries = snap.val() ? Object.values(snap.val()) : []; renderTable(); }); }
    function formatT(min) { const h = Math.floor(Math.abs(min)/60); const m = Math.round(Math.abs(min)%60); return `${min < 0 ? '-' : ''}${h}h${m.toString().padStart(2, '0')}`; }
    function openTab(id, btn) { document.querySelectorAll('.content').forEach(c => c.style.display = 'none'); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id).style.display = 'block'; btn.classList.add('active'); }
    function switchSubTab(t) { document.getElementById('form-work').style.display = t === 'work' ? 'block' : 'none'; document.getElementById('form-vacation').style.display = t === 'vacation' ? 'block' : 'none'; document.getElementById('btn-w').classList.toggle('active', t==='work'); document.getElementById('btn-v').classList.toggle('active', t==='vacation'); }
    function initApp() {
        const mSel = document.getElementById('selectMonth');
        ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"].forEach((n, i) => mSel.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${n}</option>`);
        const ySel = document.getElementById('selectYear');
        for(let y = 2024; y <= 2030; y++) ySel.innerHTML += `<option value="${y}" ${y==new Date().getFullYear()?'selected':''}>${y}</option>`;
    }
    function showAuth(t) { document.getElementById('auth-login').style.display = t==='login'?'block':'none'; document.getElementById('auth-register').style.display = t==='register'?'block':'none'; }
    function handleRegister() {
        const uId = document.getElementById('regUser').value.trim().toLowerCase();
        db.ref('users/'+uId).set({ nom: document.getElementById('regNom').value.trim().toUpperCase(), prenom: document.getElementById('regPrenom').value.trim(), pin: document.getElementById('regPin').value, role: "user", active: false });
        alert("Demande envoyée."); showAuth('login');
    }
    async function deleteEntry(k) { if(confirm("Supprimer ?")) await db.ref('users/'+user.id+'/entries/'+k.replace(/-/g, '')).remove(); }
</script>
</body>
</html>
