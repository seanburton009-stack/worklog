<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dräger WorkLog</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #003366; --secondary: #3498db; --bg: #f0f2f5; --safe-top: env(safe-area-inset-top); }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        #login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .box { background: white; padding: 30px; border-radius: 25px; width: 80%; max-width: 300px; text-align: center; }
        .container { padding: calc(var(--safe-top) + 20px) 15px 120px 15px; max-width: 600px; margin: auto; display: none; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9em; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .check-row { display: flex; justify-content: space-around; margin: 15px 0; background: #eef2f7; padding: 10px; border-radius: 10px; }
        .check-item { display: flex; align-items: center; gap: 8px; font-size: 0.85em; font-weight: bold; }
        .btn-main { width: 100%; background: var(--secondary); color: white; padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; }
        .tabs { display: flex; background: white; position: fixed; bottom: 0; left: 0; right: 0; padding: 10px; border-top: 1px solid #ccc; }
        .tab { flex: 1; border: none; background: none; font-size: 12px; color: #888; }
        .tab.active { color: var(--secondary); font-weight: bold; }
        .stat-banner { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: white; padding: 10px; border-radius: 15px; text-align: center; font-size: 0.8em; }
        .stat-box b { display: block; font-size: 1.2em; color: var(--primary); }
        .stat-highlight { grid-column: span 2; border: 2px solid var(--secondary); }
        table { width: 100%; border-collapse: collapse; font-size: 0.72em; }
        th, td { padding: 8px 2px; text-align: center; border-bottom: 1px solid #eee; }
        .diff-pos { color: #27ae60; font-weight: bold; }
        .diff-neg { color: #e74c3c; }
        .holiday-row { background: #f0f7ff; font-weight: bold; }
    </style>
</head>
<body onload="initApp()">

<div id="login-overlay">
    <div class="box">
        <h2>Dräger - RSS</h2>
        <input type="text" id="userInput" class="login-input" style="width:100%; padding:10px; margin-bottom:10px;" placeholder="Utilisateur">
        <input type="password" id="userPin" style="width:100%; padding:10px; margin-bottom:10px; text-align:center;" maxlength="4" placeholder="PIN">
        <button class="btn-main" onclick="handleAuth()">Se connecter</button>
    </div>
</div>

<div class="container" id="mainContainer">
    <div id="saisie" class="content active">
        <div class="card">
            <div class="input-group">
                <label id="l-activity">Activité</label>
                <select id="entryType" onchange="toggleForm()">
                    <option value="WORK">🛠 Travail / Werk</option>
                    <option value="CONGE">🌴 Absence / Verlof</option>
                </select>
            </div>

            <div id="work-fields">
                <div class="input-group"><label>Date</label><input type="date" id="date"></div>
                <div style="display:flex; gap:10px;">
                    <div class="input-group" style="flex:1;"><label id="l-start">Départ</label><input type="time" id="startTime" value="06:30"></div>
                    <div class="input-group" style="flex:1;"><label id="l-end">Arrivée</label><input type="time" id="endTime" value="16:00"></div>
                </div>

                <div class="check-row">
                    <div class="check-item"><input type="checkbox" id="homeStart"><label for="homeStart">🏠 Départ Maison</label></div>
                    <div class="check-item"><input type="checkbox" id="homeEnd"><label for="homeEnd">🏠 Retour Maison</label></div>
                </div>

                <div class="input-group">
                    <label id="l-loc">Lieu</label>
                    <select id="location">
                        <option value="Wemmel">Wemmel</option>
                        <option value="Client">Client</option>
                        <option value="Esso">Esso</option>
                    </select>
                </div>
            </div>

            <div id="conge-fields" style="display:none;">
                <select id="subCongeType" style="margin-bottom:10px;">
                    <option value="ANNUEL">🌴 Congé</option>
                    <option value="FERIE">🇧🇪 Férié</option>
                    <option value="MALADIE">🤒 Maladie</option>
                    <option value="RECU">⏳ Récup</option>
                </select>
                <input type="date" id="dateStart" style="margin-bottom:10px;">
                <input type="date" id="dateEnd">
            </div>
            <button class="btn-main" onclick="saveData()" style="margin-top:15px;">Enregistrer / Opslaan</button>
        </div>
    </div>

    <div id="historique" class="content" style="display:none;">
        <div class="stat-banner">
            <div class="stat-box stat-highlight"><span id="l-stat-rem">Reste à faire (39h)</span><b id="stat-remaining">0h00</b></div>
            <div class="stat-box"><span>Congés</span><b id="stat-conge">28</b></div>
            <div class="stat-box"><span>Balance</span><b id="stat-hours">0h00</b></div>
        </div>
        <div class="card">
            <select id="selectMonth" onchange="renderTable()" style="margin-bottom:10px;"></select>
            <table id="tableData">
                <thead><tr><th>J</th><th>Lieu</th><th>Presté</th><th>+/-</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
            <button class="btn-main" onclick="softLogout()" style="background:#555; margin-top:15px;">Quitter</button>
        </div>
    </div>
</div>

<nav class="tabs">
    <button class="tab active" onclick="openTab('saisie', this)">➕ Pointer</button>
    <button class="tab" onclick="openTab('historique', this)">📅 Calendrier</button>
</nav>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBPC6cJgFwBrSOppxE_kQDA2gs1ioEvGCw", authDomain: "worklog-fc54b.firebaseapp.com", databaseURL: "https://worklog-fc54b-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "worklog-fc54b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let entries = [];
    let currentUserId = "";

    function initApp() {
        const last = localStorage.getItem('lastLoggedUser');
        if(last) document.getElementById('userInput').value = last;
        document.getElementById('date').valueAsDate = new Date();
    }

    function handleAuth() {
        const u = document.getElementById('userInput').value.trim().toLowerCase();
        const p = document.getElementById('userPin').value;
        if(!u || p.length < 4) return;
        currentUserId = u;
        localStorage.setItem('lastLoggedUser', u);
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('mainContainer').style.display = 'block';
        loadData();
    }

    function loadData() {
        db.ref('users/' + currentUserId + '/entries').on('value', (snap) => {
            entries = snap.val() ? Object.values(snap.val()) : [];
            renderTable();
        });
    }

    async function saveData() {
        const type = document.getElementById('entryType').value;
        if(type === "CONGE") {
            let s = new Date(document.getElementById('dateStart').value);
            let e = new Date(document.getElementById('dateEnd').value);
            for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
                if (d.getDay() !== 0 && d.getDay() !== 6) {
                    const dKey = d.toISOString().split('T')[0];
                    await db.ref('users/'+currentUserId+'/entries/'+dKey.replace(/-/g,'')).set({ date: dKey, location: "CONGE", subType: document.getElementById('subCongeType').value, minutes: 0 });
                }
            }
        } else {
            const dateVal = document.getElementById('date').value; // YYYY-MM-DD
            const isHomeS = document.getElementById('homeStart').checked;
            const isHomeE = document.getElementById('homeEnd').checked;
            
            // Calcul précis en minutes
            let start = new Date(`${dateVal}T${document.getElementById('startTime').value}`);
            let end = new Date(`${dateVal}T${document.getElementById('endTime').value}`);
            let totalMinutes = (end - start) / 60000;

            // Déduction trajet : 30 min par trajet maison coché
            if (isHomeS) totalMinutes -= 30;
            if (isHomeE) totalMinutes -= 30;

            const loc = document.getElementById('location').value;
            let displayLoc = (isHomeS ? "🏠→" : "") + loc + (isHomeE ? "→🏠" : "");

            await db.ref('users/'+currentUserId+'/entries/'+dateVal.replace(/-/g,'')).set({
                date: dateVal, location: displayLoc, minutes: totalMinutes,
                start: document.getElementById('startTime').value,
                end: document.getElementById('endTime').value
            });
        }
        alert("Enregistré !");
    }

    function renderTable() {
        const m = parseInt(document.getElementById('selectMonth').value || new Date().getMonth());
        const y = new Date().getFullYear();
        const tBody = document.getElementById('tableBody'); tBody.innerHTML = '';
        let balance = 0, conge = 0, weekDone = 0;

        const now = new Date();
        const dayIdx = now.getDay() || 7;
        const mon = new Date(now); mon.setDate(now.getDate() - dayIdx + 1); mon.setHours(0,0,0,0);
        const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59);

        const days = new Date(y, m + 1, 0).getDate();
        for (let i = 1; i <= days; i++) {
            const dObj = new Date(y, m, i);
            const dStr = dObj.toISOString().split('T')[0];
            const e = entries.find(x => x.date === dStr);
            const dNum = dObj.getDay();
            
            // Objectif 39h : Lun-Jeu = 8h (480), Ven = 7h (420)
            let goal = (dNum >= 1 && dNum <= 4) ? 480 : (dNum === 5 ? 420 : 0);
            
            let diff = 0, info = "-", prest = "-";
            if (e) {
                if (e.location !== 'CONGE') {
                    diff = e.minutes - goal; balance += diff; info = e.location; prest = formatT(e.minutes);
                    if (dObj >= mon && dObj <= sun) weekDone += e.minutes;
                } else {
                    info = e.subType; if(e.subType === "ANNUEL") conge++;
                    if (dObj >= mon && dObj <= sun) weekDone += goal;
                }
            }
            const rCl = (dNum === 0 || dNum === 6) ? 'weekend' : (e && e.location === 'CONGE' ? 'holiday-row' : '');
            tBody.innerHTML += `<tr class="${rCl}"><td>${i}</td><td>${info}</td><td>${prest}</td><td class="${diff>=0?'diff-pos':'diff-neg'}">${e?formatT(diff):'-'}</td></tr>`;
        }
        document.getElementById('stat-conge').innerText = (28 - conge);
        document.getElementById('stat-hours').innerText = formatT(balance);
        let rem = 2340 - weekDone; // 39h = 2340m
        document.getElementById('stat-remaining').innerText = rem > 0 ? formatT(rem) : "Objectif OK";
    }

    function formatT(min) {
        const h = Math.floor(Math.abs(min)/60);
        const m = Math.round(Math.abs(min)%60);
        return `${min < 0 ? '-' : ''}${h}h${m.toString().padStart(2, '0')}`;
    }

    function openTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).style.display = 'block'; btn.classList.add('active');
    }

    function toggleForm() {
        const isC = document.getElementById('entryType').value === "CONGE";
        document.getElementById('work-fields').style.display = isC ? 'none' : 'block';
        document.getElementById('conge-fields').style.display = isC ? 'block' : 'none';
    }

    function softLogout() { document.getElementById('mainContainer').style.display='none'; document.getElementById('login-overlay').style.display='flex'; }

    const mNames = ["Jan", "Fév", "Mar", "Avr", "Mai", "Jui", "Jul", "Aoû", "Sep", "Oct", "Nov", "Déc"];
    mNames.forEach((n, i) => document.getElementById('selectMonth').innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${n}</option>`);
</script>
</body>
</html>
