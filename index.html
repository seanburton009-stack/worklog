<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dräger WorkLog Sync</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #003366; --secondary: #3498db; --success: #27ae60; --danger: #e74c3c; --draeger-blue: #005596; --draeger-bg: #fff9f0; --draeger-border: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        #login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; }
        .container { background: white; padding: 15px; border-radius: 15px; width: 100%; max-width: 500px; display: none; box-sizing: border-box; }
        .user-info { border-bottom: 2px solid var(--draeger-blue); padding-bottom: 10px; margin-bottom: 15px; }
        .user-info .name { font-weight: bold; font-size: 1.1em; color: var(--draeger-blue); }
        .lang-switch { display: flex; gap: 5px; justify-content: flex-end; margin-bottom: 10px; align-items: center; }
        .lang-btn { padding: 5px 12px; border: 1px solid #ddd; border-radius: 5px; background: white; font-weight: bold; cursor: pointer; }
        .lang-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); }
        .tabs { display: flex; margin-bottom: 15px; border-bottom: 1px solid #ddd; }
        .tab { flex: 1; padding: 12px; text-align: center; border: none; background: none; font-weight: bold; color: #777; cursor: pointer; }
        .tab.active { color: var(--secondary); border-bottom: 3px solid var(--secondary); }
        .content { display: none; }
        .content.active { display: block; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85em; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; }
        .checkbox-group { display: flex; align-items: center; justify-content: flex-start; gap: 15px; background: var(--draeger-bg); padding: 12px; border-radius: 10px; border: 1px solid var(--draeger-border); margin-bottom: 15px; cursor: pointer; width: 100%; box-sizing: border-box; }
        .checkbox-group input { width: 22px; height: 22px; margin: 0; }
        .checkbox-group.active { background: #fff4e5; border-width: 2px; }
        .summary-box { display: flex; gap: 10px; margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px; }
        .summary-item { flex: 1; background: #f8f9fa; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #eee; }
        .btn-main { width: 100%; background: var(--secondary); color: white; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; margin-top: 10px; table-layout: fixed; }
        th, td { border: 1px solid #eee; padding: 8px 4px; text-align: center; }
        .col-date { width: 60px; }
        .weekend { background: #f9f9f9; color: #bbb; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color:var(--primary);">WorkLog Cloud</h2>
        <input type="text" id="loginUser" placeholder="ID (ex: burtonse)" style="margin-bottom:10px;">
        <input type="password" id="loginPass" placeholder="PIN" style="margin-bottom:20px;">
        <button class="btn-main" onclick="checkLogin()">Connexion</button>
        <p id="loginError" style="color:var(--danger); display:none; font-size: 0.8em; margin-top:10px;">Accès refusé</p>
    </div>
</div>

<div class="container" id="mainContainer">
    <div class="lang-switch">
        <div style="font-size: 0.65em; color: #27ae60; font-weight: bold; margin-right: auto;">● Sync On</div>
        <button class="lang-btn" id="btn-fr" onclick="setLanguage('fr')">FR</button>
        <button class="lang-btn" id="btn-nl" onclick="setLanguage('nl')">NL</button>
    </div>

    <div class="user-info">
        <span class="name" id="userNameDisp"></span>
    </div>

    <div class="tabs">
        <button class="tab active" id="tab-saisie" onclick="openTab('saisie')">Saisie</button>
        <button class="tab" id="tab-historique" onclick="openTab('historique')">Tableau</button>
    </div>

    <div id="saisie" class="content active">
        <div class="input-group"><label id="label-date">Date</label><input type="date" id="date"></div>
        <div class="input-group">
            <label id="label-location">Lieu</label>
            <select id="location">
                <option value="Wemmel">Wemmel (45m)</option>
                <option value="Esso">Esso (30m)</option>
                <option value="INEOS">INEOS (30m)</option>
                <option value="Autre">Autre / Overig (30m)</option>
            </select>
        </div>
        
        <div class="checkbox-group" id="clientContainer" onclick="toggleCheckbox()">
            <input type="checkbox" id="isClient" onchange="updateLabels(); handleCheckboxStyle();" onclick="event.stopPropagation()">
            <div style="display:flex; flex-direction:column; text-align:left;">
                <span id="label-isclient" style="font-weight: bold; font-size: 0.9em;"></span>
                <span id="label-isclient-sub" style="font-size: 0.75em; color: #666;"></span>
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex:1;"><label id="labelStart">Début</label><input type="time" id="startTime"></div>
            <div class="input-group" style="flex:1;"><label id="labelEnd">Fin</label><input type="time" id="endTime"></div>
        </div>
        
        <button class="btn-main" id="btn-save" onclick="addEntry()">Enregistrer</button>
        <div class="summary-box" id="weeklySummary"></div>
    </div>

    <div id="historique" class="content">
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <select id="selectMonth" style="flex: 2;" onchange="renderMonthlyTable()"></select>
            <select id="selectYear" style="flex: 1;" onchange="renderMonthlyTable()"></select>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th class="col-date" id="th-date">Date</th><th id="th-hours">Horaires</th><th id="th-pres">Total</th><th id="th-supp">Diff</th><th style="width:30px;"></th></tr>
                </thead>
                <tbody id="monthlyTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBPC6cJgFwBrSOppxE_kQDA2gs1ioEvGCw",
        authDomain: "worklog-fc54b.firebaseapp.com",
        databaseURL: "https://worklog-fc54b-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "worklog-fc54b",
        storageBucket: "worklog-fc54b.firebasestorage.app",
        messagingSenderId: "1031734193051",
        appId: "1:1031734193051:web:6a8df0f57aa4d63796cf3e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const USER_DB = { "burtonse": { pass: "0514", name: "Sean Burton" } };
    let entries = [];
    let currentUserId = "";
    let currentLang = localStorage.getItem('userLang') || 'fr';

    const i18n = {
        fr: {
            tabs: ["Saisie", "Tableau"], labelDate: "Date", labelLoc: "Lieu",
            clientTitle: "🚗 Déplacement Client", clientSub: "(-1h trajet maison)",
            start: "Début", end: "Fin", startClient: "Départ Maison", endClient: "Retour Maison",
            saveBtn: "Enregistrer & Synchroniser", adv: "Fait (Semaine)", rem: "Reste / 39h",
            th: ["Date", "Heures", "Total", "Diff"],
            months: ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"],
            days: ["Di", "Lu", "Ma", "Me", "Je", "Ve", "Sa"]
        },
        nl: {
            tabs: ["Invoer", "Tabel"], labelDate: "Datum", labelLoc: "Locatie",
            clientTitle: "🚗 Klantverplaatsing", clientSub: "(-1u reistijd thuis)",
            start: "Start", end: "Einde", startClient: "Vertrek Thuis", endClient: "Terugkomst Thuis",
            saveBtn: "Opslaan & Sync", adv: "Gedaan (Week)", rem: "Over / 39u",
            th: ["Datum", "Uren", "Totaal", "Diff"],
            months: ["Januari", "Februari", "Maart", "April", "Mei", "Juni", "Juli", "Augustus", "September", "Oktober", "November", "December"],
            days: ["Zo", "Ma", "Di", "Wo", "Do", "Vr", "Za"]
        }
    };

    function checkLogin() {
        const u = document.getElementById('loginUser').value.toLowerCase();
        const p = document.getElementById('loginPass').value;
        if(USER_DB[u] && USER_DB[u].pass === p) {
            currentUserId = u;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            document.getElementById('userNameDisp').innerText = USER_DB[u].name;
            loadData();
            setLanguage(currentLang);
        } else { document.getElementById('loginError').style.display = 'block'; }
    }

    function loadData() {
        db.ref('users/' + currentUserId + '/entries').on('value', (snapshot) => {
            const data = snapshot.val();
            // On transforme l'objet Firebase en liste propre pour le code
            entries = data ? Object.values(data) : [];
            updateWeeklyStatus();
            renderMonthlyTable();
        });
    }

    function addEntry() {
        const d = document.getElementById('date').value;
        const s = document.getElementById('startTime').value;
        const e = document.getElementById('endTime').value;
        const l = document.getElementById('location').value;
        const c = document.getElementById('isClient').checked;
        if (!d || !s || !e) return;

        let diff = (new Date(`${d}T${e}`) - new Date(`${d}T${s}`)) / 60000;
        if (c) diff -= 60; // -1h si déplacement client
        diff -= (l === "Wemmel") ? 45 : 30; // -trajet fixe

        const entry = { date: d, location: l, minutes: diff, start: s, end: e, isClient: c };
        
        // Enregistrement avec la date comme clé unique
        db.ref('users/' + currentUserId + '/entries/' + d.replace(/-/g, '')).set(entry)
        .then(() => {
            alert("✅ Données synchronisées !");
        });
    }

    function deleteEntry(d) {
        if(confirm("Supprimer cette ligne ?")) {
            db.ref('users/' + currentUserId + '/entries/' + d.replace(/-/g, '')).remove();
        }
    }

    function formatTime(min) {
        const h = Math.floor(Math.abs(min) / 60);
        const m = Math.round(Math.abs(min) % 60);
        return `${min < 0 ? '-' : ''}${h}h${m.toString().padStart(2, '0')}`;
    }

    function updateWeeklyStatus() {
        const t = i18n[currentLang];
        const now = new Date();
        const day = now.getDay() || 7;
        const startOfWeek = new Date(now);
        startOfWeek.setDate(now.getDate() - day + 1);
        startOfWeek.setHours(0,0,0,0);
        
        const endOfWeek = new Date(startOfWeek);
        endOfWeek.setDate(startOfWeek.getDate() + 6);
        endOfWeek.setHours(23,59,59,999);
        
        const weeklyMinutes = entries.reduce((sum, e) => {
            const ed = new Date(e.date);
            return (ed >= startOfWeek && ed <= endOfWeek) ? sum + (e.minutes || 0) : sum;
        }, 0);

        const target = 39 * 60;
        const rem = target - weeklyMinutes;

        document.getElementById('weeklySummary').innerHTML = `
            <div class="summary-item"><span style="font-size:0.75em; color:#666;">${t.adv}</span><br><b>${formatTime(weeklyMinutes)}</b></div>
            <div class="summary-item"><span style="font-size:0.75em; color:#666;">${t.rem}</span><br><b style="color:${rem > 0 ? '#f39c12' : '#27ae60'}">${rem > 0 ? formatTime(rem) : 'OK'}</b></div>
        `;
    }

    function renderMonthlyTable() {
        const t = i18n[currentLang];
        const m = parseInt(document.getElementById('selectMonth').value);
        const y = parseInt(document.getElementById('selectYear').value);
        const tbody = document.getElementById('monthlyTableBody');
        tbody.innerHTML = '';
        
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        for (let i = 1; i <= daysInMonth; i++) {
            const dateObj = new Date(y, m, i);
            const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const entry = entries.find(e => e.date === dateStr);
            const dNum = dateObj.getDay();
            
            let goal = (dNum === 0 || dNum === 6) ? 0 : (dNum === 5 ? 420 : 480);
            let supp = entry ? entry.minutes - goal : 0;
            
            tbody.innerHTML += `<tr class="${(dNum === 0 || dNum === 6) ? 'weekend' : ''}">
                <td style="font-size:0.85em;">${t.days[dNum]} ${i}</td>
                <td>${entry ? entry.start + '-' + entry.end : '-'}</td>
                <td style="font-weight:bold;">${entry ? formatTime(entry.minutes) : '-'}</td>
                <td style="color:${supp > 0 ? 'green' : (supp < 0 ? 'red' : 'black')}">${entry ? formatTime(supp) : '-'}</td>
                <td><span onclick="deleteEntry('${dateStr}')" style="cursor:pointer; color:red;">✕</span></td>
            </tr>`;
        }
    }

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('userLang', lang);
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
        updateLabels();
        updateWeeklyStatus();
        renderMonthlyTable();
    }

    function updateLabels() {
        const t = i18n[currentLang];
        document.getElementById('tab-saisie').innerText = t.tabs[0];
        document.getElementById('tab-historique').innerText = t.tabs[1];
        document.getElementById('label-date').innerText = t.labelDate;
        document.getElementById('label-location').innerText = t.labelLoc;
        document.getElementById('label-isclient').innerText = t.clientTitle;
        document.getElementById('label-isclient-sub').innerText = t.clientSub;
        document.getElementById('btn-save').innerText = t.saveBtn;
        document.getElementById('th-date').innerText = t.th[0];
        document.getElementById('th-hours').innerText = t.th[1];
        document.getElementById('th-pres').innerText = t.th[2];
        document.getElementById('th-supp').innerText = t.th[3];
        
        const isClient = document.getElementById('isClient').checked;
        document.getElementById('labelStart').innerText = isClient ? t.startClient : t.start;
        document.getElementById('labelEnd').innerText = isClient ? t.endClient : t.end;

        const mSel = document.getElementById('selectMonth');
        if(!mSel.innerHTML) {
            t.months.forEach((m, i) => mSel.innerHTML += `<option value="${i}" ${i == new Date().getMonth() ? 'selected' : ''}>${m}</option>`);
        }
    }

    function toggleCheckbox() { document.getElementById('isClient').checked = !document.getElementById('isClient').checked; handleCheckboxStyle(); updateLabels(); }
    function handleCheckboxStyle() { const c = document.getElementById('clientContainer'); document.getElementById('isClient').checked ? c.classList.add('active') : c.classList.remove('active'); }
    function openTab(id) { document.querySelectorAll('.content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    const ySel = document.getElementById('selectYear');
    [2025, 2026].forEach(y => ySel.innerHTML += `<option value="${y}" ${y === new Date().getFullYear() ? 'selected' : ''}>${y}</option>`);
    document.getElementById('date').valueAsDate = new Date();
</script>
</body>
</html>
