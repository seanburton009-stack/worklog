<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dräger WorkLog</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WorkLog">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2618/2618311.png">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --primary: #003366; --secondary: #3498db; --bg: #f0f2f5; 
            --safe-top: env(safe-area-inset-top);
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }

        #login-overlay { 
            position: fixed; inset: 0; background: var(--primary); 
            display: flex; justify-content: center; align-items: center; z-index: 2000; 
        }
        
        .box { 
            background: white; padding: 25px; border-radius: 20px; 
            width: 85%; max-width: 320px; text-align: center;
        }

        .container { 
            padding: calc(var(--safe-top) + 20px) 15px 100px 15px; 
            max-width: 600px; margin: auto; display: none;
        }

        .tabs { 
            display: flex; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            position: fixed; bottom: 0; left: 0; right: 0; 
            padding: 10px 10px calc(env(safe-area-inset-bottom) + 10px) 10px;
            border-top: 1px solid #ccc; z-index: 1000;
        }
        .tab { 
            flex: 1; border: none; background: none; font-size: 12px; 
            color: #888; display: flex; flex-direction: column; align-items: center; 
        }
        .tab.active { color: var(--secondary); font-weight: bold; }

        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9em; color: #444; }
        input, select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; 
            font-size: 16px; box-sizing: border-box; background: #f9f9f9;
        }

        .btn-main { 
            width: 100%; background: var(--secondary); color: white; padding: 16px; 
            border: none; border-radius: 12px; font-weight: bold; font-size: 16px;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th, td { padding: 12px 5px; text-align: center; border-bottom: 1px solid #eee; }
        
        .stat-banner { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: white; padding: 15px; border-radius: 15px; text-align: center; }
        .stat-box b { display: block; font-size: 1.4em; color: var(--primary); }

        .weekend { color: #ccc; background: #fafafa; }
        .holiday-row { color: var(--secondary); font-weight: bold; background: #f0f7ff; }
        .diff-pos { color: #27ae60; font-weight: bold; }
        .diff-neg { color: #e74c3c; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="box">
        <h2 style="color:var(--primary); margin:0 0 20px 0;">Dräger - RSS - Heures</h2>
        <input type="text" id="loginUser" placeholder="Utilisateur (burtonse)">
        <button class="btn-main" style="margin-top:20px;" onclick="checkLogin()">Ouvrir ma session</button>
    </div>
</div>

<div class="container" id="mainContainer">
    <div id="saisie" class="content active">
        <h2 style="margin-top:0;">Pointer</h2>
        <div class="card">
            <div class="input-group">
                <label>Activité</label>
                <select id="entryType" onchange="toggleForm()">
                    <option value="WORK">🛠 Travail</option>
                    <option value="CONGE">🌴 Congé / Absence</option>
                </select>
            </div>
            <div id="work-fields">
                <div class="input-group"><label>Date</label><input type="date" id="date"></div>
                <div style="display:flex; gap:10px;">
                    <div class="input-group" style="flex:1;"><label>Début</label><input type="time" id="startTime" value="08:00"></div>
                    <div class="input-group" style="flex:1;"><label>Fin</label><input type="time" id="endTime" value="16:30"></div>
                </div>
                <div class="input-group">
                    <label>Lieu</label>
                    <select id="location">
                        <option value="Wemmel">Wemmel (45m pause)</option>
                        <option value="Client">Client (30m pause)</option>
                        <option value="Esso">Esso (30m pause)</option>
                    </select>
                </div>
            </div>
            <div id="conge-fields" style="display:none;">
                <div class="input-group"><label>Type d'absence</label>
                    <select id="subCongeType">
                        <option value="ANNUEL">🌴 Congé Annuel</option>
                        <option value="FERIE">🇧🇪 Jour Férié</option>
                        <option value="MALADIE">🤒 Maladie</option>
                        <option value="RECU">⏳ Récupération</option>
                    </select>
                </div>
                <div class="input-group"><label>Du</label><input type="date" id="dateStart"></div>
                <div class="input-group"><label>Au</label><input type="date" id="dateEnd"></div>
            </div>
            <button class="btn-main" onclick="saveData()">Enregistrer</button>
        </div>
    </div>

    <div id="historique" class="content" style="display:none;">
        <div class="stat-banner">
            <div class="stat-box">Solde Congés<b id="stat-conge">28</b></div>
            <div class="stat-box">Heures Suppl.<b id="stat-hours">0h00</b></div>
        </div>
        <div class="card">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <select id="selectMonth" onchange="renderTable()" style="flex:2;"></select>
                <select id="selectYear" onchange="renderTable()" style="flex:1;"></select>
            </div>
            <table>
                <thead><tr><th>Jour</th><th>Détails</th><th>Prestation</th><th>+/-</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<nav class="tabs">
    <button class="tab active" onclick="openTab('saisie', this)"><span>➕ Pointer</span></button>
    <button class="tab" onclick="openTab('historique', this)"><span>📅 Calendrier</span></button>
</nav>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBPC6cJgFwBrSOppxE_kQDA2gs1ioEvGCw", authDomain: "worklog-fc54b.firebaseapp.com", databaseURL: "https://worklog-fc54b-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "worklog-fc54b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let entries = [];
    let currentUserId = "";

    function checkLogin() {
        const u = document.getElementById('loginUser').value.trim().toLowerCase();
        if(u === "burtonse") {
            currentUserId = u;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            loadData();
        }
    }

    function loadData() {
        db.ref('users/' + currentUserId + '/entries').on('value', (snap) => {
            entries = snap.val() ? Object.values(snap.val()) : [];
            renderTable();
        });
    }

    async function saveData() {
        const type = document.getElementById('entryType').value;
        if(type === "CONGE") {
            let start = new Date(document.getElementById('dateStart').value);
            let end = new Date(document.getElementById('dateEnd').value);
            for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                if (d.getDay() !== 0 && d.getDay() !== 6) {
                    const dStr = d.toISOString().split('T')[0];
                    await db.ref('users/'+currentUserId+'/entries/'+dStr.replace(/-/g,'')).set({
                        date: dStr, location: "CONGE", subType: document.getElementById('subCongeType').value, minutes: 0
                    });
                }
            }
        } else {
            const d = document.getElementById('date').value;
            let diff = (new Date(`${d}T${document.getElementById('endTime').value}`) - new Date(`${d}T${document.getElementById('startTime').value}`)) / 60000;
            diff -= (document.getElementById('location').value === "Wemmel" ? 45 : 30);
            await db.ref('users/'+currentUserId+'/entries/'+d.replace(/-/g,'')).set({
                date: d, location: document.getElementById('location').value, minutes: diff, 
                start: document.getElementById('startTime').value, end: document.getElementById('endTime').value
            });
        }
        alert("Enregistré !");
    }

    function renderTable() {
        const m = parseInt(document.getElementById('selectMonth').value);
        const y = parseInt(document.getElementById('selectYear').value);
        const tBody = document.getElementById('tableBody'); tBody.innerHTML = '';
        let totalSuppMinutes = 0, congePris = 0;
        const daysInMonth = new Date(y, m + 1, 0).getDate();

        for (let i = 1; i <= daysInMonth; i++) {
            const dStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const entry = entries.find(e => e.date === dStr);
            const dObj = new Date(y, m, i);
            const dNum = dObj.getDay();
            let goal = (dNum === 0 || dNum === 6) ? 0 : (dNum === 5 ? 420 : 480);
            let diff = 0, rClass = (dNum === 0 || dNum === 6) ? 'weekend' : '', info = "-";

            if (entry) {
                if (entry.location !== 'CONGE') {
                    diff = entry.minutes - goal; 
                    totalSuppMinutes += diff;
                    info = entry.location;
                } else { 
                    info = entry.subType; 
                    rClass = 'holiday-row';
                    if(entry.subType === "ANNUEL") congePris++;
                }
            }
            const diffClass = diff > 0 ? 'diff-pos' : (diff < 0 ? 'diff-neg' : '');
            tBody.innerHTML += `<tr class="${rClass}"><td>${i}</td><td>${info}</td><td>${entry ? formatT(entry.minutes) : '-'}</td><td class="${diffClass}">${entry ? formatT(diff) : '-'}</td></tr>`;
        }
        document.getElementById('stat-conge').innerText = (28 - congePris);
        document.getElementById('stat-hours').innerText = formatT(totalSuppMinutes);
    }

    function formatT(min) {
        const h = Math.floor(Math.abs(min)/60);
        const m = Math.round(Math.abs(min)%60);
        return `${min < 0 ? '-' : ''}${h}h${m.toString().padStart(2, '0')}`;
    }

    function openTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
    }

    function toggleForm() {
        const isC = document.getElementById('entryType').value === "CONGE";
        document.getElementById('work-fields').style.display = isC ? 'none' : 'block';
        document.getElementById('conge-fields').style.display = isC ? 'block' : 'none';
    }

    const mNames = ["Jan", "Fév", "Mar", "Avr", "Mai", "Juin", "Juil", "Août", "Sep", "Oct", "Nov", "Déc"];
    mNames.forEach((n, i) => document.getElementById('selectMonth').innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${n}</option>`);
    [2025, 2026].forEach(y => document.getElementById('selectYear').innerHTML += `<option value="${y}" ${y==2026?'selected':''}>${y}</option>`);
    document.getElementById('date').valueAsDate = new Date();
    document.getElementById('dateStart').valueAsDate = new Date();
    document.getElementById('dateEnd').valueAsDate = new Date();
</script>
</body>
</html>
