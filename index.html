<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dräger WorkLog V27</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --primary: #003366; 
            --secondary: #005eb8; 
            --bg: #f4f7f9; 
            --danger: #d9534f; 
            --success: #28a745;
            --emerald: #2ecc71;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        
        #login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .box { background: white; padding: 35px; border-radius: 24px; width: 85%; max-width: 340px; text-align: center; box-shadow: var(--shadow); }
        .container { padding: 20px 15px 120px 15px; max-width: 650px; margin: auto; display: none; }
        
        .card { background: white; border-radius: 18px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.03); }
        
        /* Styles des compteurs du haut */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .info-week { background: white; border-top: 5px solid var(--primary); padding: 15px; border-radius: 12px; box-shadow: var(--shadow); text-align: center; }
        .info-week.conges { border-top-color: var(--emerald); }
        .info-week.overtime { border-top-color: var(--secondary); }
        .info-week span { font-size: 0.75em; color: #64748b; font-weight: 600; text-transform: uppercase; display: block; line-height: 1.2; }
        .info-week b { font-size: 1.6em; color: var(--primary); display: block; margin-top: 5px; }
        .info-week.conges b { color: var(--emerald); }

        label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.85em; color: var(--primary); text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; border: 1.5px solid #e1e8ed; border-radius: 12px; font-size: 16px; margin-bottom: 15px; }
        
        .sub-tabs { display: flex; gap: 10px; margin-bottom: 20px; background: #e2e8f0; padding: 5px; border-radius: 12px; }
        .sub-tab { flex: 1; padding: 10px; border: none; background: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #64748b; font-size: 0.9em; transition: 0.3s; }
        .sub-tab.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .btn-main { 
            width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; padding: 18px; border: none; border-radius: 14px; font-weight: 700; 
            font-size: 16px; cursor: pointer;
        }

        .tabs { display: flex; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); position: fixed; bottom: 0; left: 0; right: 0; padding: 12px; border-top: 1px solid #e1e8ed; z-index: 1000; }
        .tab { flex: 1; border: none; background: none; font-size: 11px; color: #94a3b8; text-align: center; }
        .tab.active { color: var(--secondary); font-weight: 800; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: center; padding: 12px 5px; color: #64748b; font-size: 0.8em; border-bottom: 2px solid #f1f5f9; }
        td { padding: 14px 5px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 0.85em; }
        .weekend { background: #fcfcfc; color: #cbd5e1; }

        @media print {
            .tabs, .logout-link, .btn-lang, .btn-main, .delete-col, #login-overlay, .sub-tabs, .filter-row, .stat-grid { display: none !important; }
            body { background: white; }
            .container { display: block !important; padding: 0; }
            #print-header { display: block; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        }
    </style>
</head>
<body onload="initApp()">

<div id="print-header" style="display:none;">
    <h1>Burton, Sean</h1>
    <p>Service Engineer - Logistic Support RSS</p>
    <p style="font-weight:bold; margin-top:15px;" id="pdf-month-title">Résumé du mois</p>
</div>

<div id="login-overlay">
    <div class="box">
        <h2 style="color:var(--primary); margin-bottom:25px;">Dräger - RSS</h2>
        <input type="text" id="userInput" placeholder="Utilisateur / Gebruiker">
        <input type="password" id="userPin" maxlength="4" placeholder="PIN">
        <button class="btn-main" onclick="handleAuth()">Connexion</button>
    </div>
</div>

<div class="container" id="mainContainer">
    <div id="saisie" class="content active">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
             <button onclick="softLogout()" class="logout-link" style="border:none; background:none; color:#64748b; font-weight:bold; cursor:pointer;" id="txt-logout">Déconnexion</button>
             <button class="btn-lang" onclick="toggleLang()" style="border:none; background:var(--primary); color:white; padding:8px 12px; border-radius:10px; cursor:pointer;">🌐 FR/NL</button>
        </div>
        
        <div class="sub-tabs">
            <button class="sub-tab active" id="txt-st-work" onclick="switchSubTab('work')">Journée de travail</button>
            <button class="sub-tab" id="txt-st-vac" onclick="switchSubTab('vacation')">Congés</button>
        </div>

        <div id="compteur-travail" class="info-week">
            <span id="txt-rem-label">Reste à prester cette semaine</span>
            <b id="stat-remaining-ptr">--h--</b>
        </div>
        <div id="compteur-conges-total" class="info-week conges" style="display:none;">
            <span id="txt-con-label">Congés légaux restants (Annuel)</span>
            <b id="stat-vac-count-total">28</b>
        </div>

        <div id="form-work" class="card">
            <label>Date</label>
            <input type="date" id="dateInput">
            <div style="display:flex; gap:15px;">
                <div style="flex:1;"><label>Arrivée</label><input type="time" id="startTime" value="08:00"></div>
                <div style="flex:1;"><label>Départ</label><input type="time" id="endTime" value="16:30"></div>
            </div>
            <label>Lieu d'intervention</label>
            <select id="location">
                <option value="Wemmel">Wemmel</option>
                <option value="Client">Client</option>
                <option value="INEOS">INEOS</option>
                <option value="Esso">Esso</option>
            </select>
            <button class="btn-main" id="txt-btn-save" onclick="saveData()">Enregistrer la journée</button>
        </div>

        <div id="form-vacation" class="card" style="display:none;">
            <label>Catégorie</label>
            <select id="vacCategory">
                <option value="Congés légaux">Congés légaux</option>
                <option value="Jour férié">Jour férié</option>
                <option value="Jour reporté">Jour reporté</option>
                <option value="Malade">Malade</option>
            </select>
            <label>Du (Inclus)</label><input type="date" id="vacStart">
            <label>Au (Inclus)</label><input type="date" id="vacEnd">
            <button class="btn-main" id="txt-btn-save-vac" onclick="saveVacation()">Enregistrer</button>
        </div>
    </div>

    <div id="historique" class="content" style="display:none;">
        <div class="stat-grid">
            <div class="info-week overtime">
                <span id="txt-stat-month-over">Heures Supp (Mois)</span>
                <b id="stat-month-over">0h00</b>
            </div>
            <div class="info-week conges">
                <span id="txt-stat-month-vac">Congés pris (Mois)</span>
                <b id="stat-month-vac">0</b>
            </div>
        </div>

        <div class="card">
            <div class="filter-row" style="display:flex; gap:10px; margin-bottom:15px;">
                <select id="selectMonth" onchange="renderTable()"></select>
                <select id="selectYear" onchange="renderTable()"></select>
            </div>
            <table>
                <thead><tr id="txt-table-head"></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <button class="btn-main" id="txt-btn-print" onclick="window.print()" style="margin-top:10px;">🖨️ Générer le rapport PDF</button>
    </div>
</div>

<nav class="tabs">
    <button class="tab active" id="txt-nav-ptr" onclick="openTab('saisie', this)">➕ POINTER</button>
    <button class="tab" id="txt-nav-cal" onclick="openTab('historique', this)">📅 CALENDRIER</button>
</nav>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBPC6cJgFwBrSOppxE_kQDA2gs1ioEvGCw", authDomain: "worklog-fc54b.firebaseapp.com", databaseURL: "https://worklog-fc54b-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "worklog-fc54b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let entries = [];
    let currentUserId = "";
    let lang = localStorage.getItem('lang') || 'fr';

    const ui = {
        fr: {
            st_work: "Journée de travail", st_vac: "Congés", logout: "Déconnexion", 
            rem_label: "Reste à prester cette semaine", con_label: "Congés légaux restants (Annuel)",
            stat_month_over: "Heures Supp (Mois)", stat_month_vac: "Congés pris (Mois)",
            btn_save: "Enregistrer la journée", btn_save_vac: "Enregistrer", btn_print: "🖨️ Générer le rapport PDF",
            nav_ptr: "➕ POINTER", nav_cal: "📅 CALENDRIER", 
            table_head: "<th>Date</th><th style='text-align:left;'>Détails</th><th>Réel</th><th>+/-</th><th class='delete-col'></th>",
            confirm_calc: "Total net : {t} - Confirmer ?",
            vac_confirm: "Confirmer {n} jour(s) ({cat}) ?", months: ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"],
            cats: ["Congés légaux", "Jour férié", "Jour reporté", "Malade"]
        },
        nl: {
            st_work: "Werkdag", st_vac: "Verlof", logout: "Uitloggen", 
            rem_label: "Nog te presteren deze week", con_label: "Resterend verlof (Jaarlijks)",
            stat_month_over: "Overuren (Maand)", stat_month_vac: "Genomen verlof (Maand)",
            btn_save: "Dag opslaan", btn_save_vac: "Opslaan", btn_print: "🖨️ PDF-rapport genereren",
            nav_ptr: "➕ INVOER", nav_cal: "📅 KALENDER", 
            table_head: "<th>Datum</th><th style='text-align:left;'>Details</th><th>Echt</th><th>+/-</th><th class='delete-col'></th>",
            confirm_calc: "Netto totaal : {t} - Bevestigen ?",
            vac_confirm: "{n} dag(en) bevestigen ({cat})?", months: ["Januari", "Februari", "Maart", "April", "Mei", "Juni", "Juli", "Augustus", "September", "Oktober", "November", "December"],
            cats: ["Wettelijke vakantie", "Feestdag", "Overgedragen dag", "Ziek"]
        }
    };

    function translateUI() {
        const t = ui[lang];
        document.getElementById('txt-st-work').innerText = t.st_work;
        document.getElementById('txt-st-vac').innerText = t.st_vac;
        document.getElementById('txt-logout').innerText = t.logout;
        document.getElementById('txt-rem-label').innerText = t.rem_label;
        document.getElementById('txt-con-label').innerText = t.con_label;
        document.getElementById('txt-stat-month-over').innerText = t.stat_month_over;
        document.getElementById('txt-stat-month-vac').innerText = t.stat_month_vac;
        document.getElementById('txt-btn-save').innerText = t.btn_save;
        document.getElementById('txt-btn-save-vac').innerText = t.btn_save_vac;
        document.getElementById('txt-btn-print').innerText = t.btn_print;
        document.getElementById('txt-nav-ptr').innerText = t.nav_ptr;
        document.getElementById('txt-nav-cal').innerText = t.nav_cal;
        document.getElementById('txt-table-head').innerHTML = t.table_head;
        updateMonthAndYearSelectors();
    }

    function switchSubTab(type) {
        document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
        document.getElementById(type === 'work' ? 'txt-st-work' : 'txt-st-vac').classList.add('active');
        document.getElementById('form-work').style.display = type === 'work' ? 'block' : 'none';
        document.getElementById('compteur-travail').style.display = type === 'work' ? 'block' : 'none';
        document.getElementById('form-vacation').style.display = type === 'vacation' ? 'block' : 'none';
        document.getElementById('compteur-conges-total').style.display = type === 'vacation' ? 'block' : 'none';
    }

    function handleAuth() {
        const u = document.getElementById('userInput').value.trim().toLowerCase();
        if(!u) return;
        currentUserId = u;
        localStorage.setItem('lastLoggedUser', u);
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('mainContainer').style.display = 'block';
        loadData();
    }

    function loadData() {
        db.ref('users/' + currentUserId + '/entries').on('value', (snap) => {
            entries = snap.val() ? Object.values(snap.val()) : [];
            renderTable();
        });
    }

    async function saveData() {
        const dateStr = document.getElementById('dateInput').value;
        const sTime = document.getElementById('startTime').value;
        const eTime = document.getElementById('endTime').value;
        const loc = document.getElementById('location').value;
        const [h1, m1] = sTime.split(':').map(Number);
        const [h2, m2] = eTime.split(':').map(Number);
        let finalMin = (h2 * 60 + m2) - (h1 * 60 + m1) - (loc === "Wemmel" ? 45 : 30);

        if(confirm(ui[lang].confirm_calc.replace('{t}', formatT(finalMin)))) {
            await db.ref('users/'+currentUserId+'/entries/'+dateStr.replace(/-/g, '')).set({
                date: dateStr, location: loc, minutes: finalMin, start: sTime, end: eTime, isVacation: false
            });
        }
    }

    async function saveVacation() {
        const start = new Date(document.getElementById('vacStart').value);
        const end = new Date(document.getElementById('vacEnd').value);
        const cat = document.getElementById('vacCategory').value;
        if(!start || !end || start > end) return;

        let workDays = [];
        let curr = new Date(start);
        while(curr <= end) {
            if(curr.getDay() !== 0 && curr.getDay() !== 6) workDays.push(new Date(curr));
            curr.setDate(curr.getDate() + 1);
        }

        if(confirm(ui[lang].vac_confirm.replace('{n}', workDays.length).replace('{cat}', cat))) {
            for(let d of workDays) {
                const ds = d.toISOString().split('T')[0];
                const dayMinutes = (d.getDay() === 5) ? 420 : 480;
                await db.ref('users/'+currentUserId+'/entries/'+ds.replace(/-/g, '')).set({
                    date: ds, location: cat, minutes: dayMinutes, isVacation: true
                });
            }
        }
    }

    function renderTable() {
        const selMonth = parseInt(document.getElementById('selectMonth').value || new Date().getMonth());
        const selYear = parseInt(document.getElementById('selectYear').value || new Date().getFullYear());
        const tBody = document.getElementById('tableBody'); tBody.innerHTML = '';
        
        let totalSuppMois = 0;
        let congesMois = 0;
        let congesLegauxTotal = 0;
        let weekWork = 0;

        const now = new Date();
        const curMon = new Date(now); curMon.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
        curMon.setHours(0,0,0,0);
        const curSun = new Date(curMon); curSun.setDate(curMon.getDate() + 6);

        // Calcul Annuel (pour le solde total)
        entries.forEach(e => {
            if(e.location === 'Congés légaux') congesLegauxTotal++;
        });

        const days = new Date(selYear, selMonth + 1, 0).getDate();
        for (let i = 1; i <= days; i++) {
            const dStr = `${selYear}-${String(selMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const dObj = new Date(selYear, selMonth, i);
            const e = entries.find(x => x.date === dStr);
            const dayIdx = dObj.getDay(); 
            let goal = (dayIdx >= 1 && dayIdx <= 4) ? 480 : (dayIdx === 5 ? 420 : 0);
            
            if(e) { 
                totalSuppMois += (e.minutes - goal);
                if(e.location === 'Congés légaux') congesMois++;
                if(dObj >= curMon && dObj <= curSun) weekWork += e.minutes;
            }

            const isWE = (dayIdx === 0 || dayIdx === 6);
            tBody.innerHTML += `<tr class="${isWE ? 'weekend' : ''}">
                <td style="font-weight:600;">${String(i).padStart(2,'0')}/${String(selMonth+1).padStart(2,'0')}</td>
                <td style="text-align:left;"><b>${e ? e.location : ''}</b></td>
                <td>${e ? formatT(e.minutes) : ''}</td>
                <td style="color:${(e && (e.minutes - goal)) >= 0 ? 'var(--success)' : 'var(--danger)'}; font-weight:700;">${e ? formatT(e.minutes - goal) : ''}</td>
                <td class="delete-col">${e ? `<span onclick="deleteEntry('${e.date}')" style="cursor:pointer;">🗑️</span>` : ''}</td>
            </tr>`;
        }
        
        // Mise à jour des compteurs
        document.getElementById('stat-month-over').innerText = formatT(totalSuppMois);
        document.getElementById('stat-month-vac').innerText = congesMois;
        document.getElementById('stat-remaining-ptr').innerText = (2340 - weekWork) <= 0 ? "OK ✅" : formatT(2340 - weekWork);
        document.getElementById('stat-vac-count-total').innerText = (28 - congesLegauxTotal);
    }

    async function deleteEntry(dateKey) { if(confirm("Supprimer ?")) await db.ref('users/'+currentUserId+'/entries/'+dateKey.replace(/-/g, '')).remove(); }
    function formatT(min) { const h = Math.floor(Math.abs(min)/60); const m = Math.round(Math.abs(min)%60); return `${min < 0 ? '-' : ''}${h}h${m.toString().padStart(2, '0')}`; }
    function openTab(id, btn) { document.querySelectorAll('.content').forEach(c => c.style.display = 'none'); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id).style.display = 'block'; btn.classList.add('active'); renderTable(); }
    function initApp() { translateUI(); }
    function toggleLang() { lang = (lang === 'fr' ? 'nl' : 'fr'); localStorage.setItem('lang', lang); translateUI(); renderTable(); }
    function softLogout() { document.getElementById('mainContainer').style.display='none'; document.getElementById('login-overlay').style.display='flex'; }
    function updateMonthAndYearSelectors() {
        const mSel = document.getElementById('selectMonth'); const curM = mSel.value || new Date().getMonth(); mSel.innerHTML = '';
        ui[lang].months.forEach((n, i) => mSel.innerHTML += `<option value="${i}" ${i==curM?'selected':''}>${n}</option>`);
        const ySel = document.getElementById('selectYear'); const curY = parseInt(ySel.value) || new Date().getFullYear(); ySel.innerHTML = '';
        for(let y = 2020; y <= 2100; y++) ySel.innerHTML += `<option value="${y}" ${y==curY?'selected':''}>${y}</option>`;
    }
</script>
</body>
</html>
