<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dräger WorkLog V45 - Final Stable</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #003366; --secondary: #005eb8; --bg: #f4f7f9; --danger: #d9534f; --emerald: #2ecc71; --shadow: 0 4px 12px rgba(0,0,0,0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; color: #333; }
        
        #login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .box { background: white; padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; }
        
        .container { padding: 10px 15px 140px 15px; max-width: 800px; margin: auto; display: none; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); overflow: hidden; }
        
        /* FIX AFFICHAGE IPHONE : Largeur contrôlée */
        label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 0.75em; color: var(--primary); text-transform: uppercase; }
        input, select { 
            width: 100% !important; 
            max-width: 100%;
            padding: 14px; 
            border: 1.5px solid #e1e8ed; 
            border-radius: 12px; 
            font-size: 16px; 
            margin-bottom: 15px; 
            display: block;
        }

        .btn-main { width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 18px; border: none; border-radius: 16px; font-weight: 700; font-size: 1.1em; cursor: pointer; }
        
        .info-week { background: white; border-top: 6px solid var(--primary); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; box-shadow: var(--shadow); }
        .info-week b { font-size: 2em; color: var(--primary); display: block; }

        .tabs { display: flex; background: white; position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 10px calc(10px + env(safe-area-inset-bottom)) 10px; border-top: 1px solid #e1e8ed; z-index: 1000; }
        .tab { flex: 1; border: none; background: none; font-size: 10px; color: #94a3b8; text-align: center; font-weight: 700; }
        .tab.active { color: var(--secondary); }
        .tab-icon { font-size: 20px; display: block; margin-bottom: 3px; }

        .sub-tabs { display: flex; gap: 10px; margin-bottom: 20px; background: #e2e8f0; padding: 5px; border-radius: 15px; }
        .sub-tab { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 800; font-size: 0.9em; }
        .sub-tab.active { background: white; color: var(--primary); }

        table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
        th { padding: 8px; color: #64748b; border-bottom: 2px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 10px 5px; text-align: center; border-bottom: 1px solid #f1f5f9; }
        .weekend { background: #f8fafc !important; }
    </style>
</head>
<body onload="initApp()">

<div id="login-overlay">
    <div class="box" id="auth-login">
        <h2 style="color:var(--primary);">Dräger RSS</h2>
        <input type="text" id="loginUser" placeholder="Utilisateur / Gebruiker">
        <input type="password" id="loginPin" maxlength="4" placeholder="PIN" inputmode="numeric">
        <button class="btn-main" onclick="handleAuth()">LOGIN</button>
        <div style="margin-top:15px;"><a onclick="showAuth('register')" style="color:var(--secondary); cursor:pointer;">+ Créer compte / Account maken</a></div>
    </div>
    <div class="box" id="auth-register" style="display:none;">
        <h2>Inscriptions</h2>
        <input type="text" id="regNom" placeholder="NOM / NAAM">
        <input type="text" id="regPrenom" placeholder="Prénom / Voornaam">
        <input type="text" id="regUser" placeholder="Utilisateur">
        <input type="password" id="regPin" maxlength="4" placeholder="PIN" inputmode="numeric">
        <button class="btn-main" onclick="handleRegister()">VALIDER</button>
        <button class="btn-main" style="background:#ccc; margin-top:10px;" onclick="showAuth('login')">RETOUR</button>
    </div>
</div>

<div class="container" id="mainContainer">
    <div id="saisie" class="content active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b id="welcome-msg" style="color:var(--primary)">...</b>
            <button onclick="location.reload()" style="color:var(--danger); border:none; background:none; font-weight:bold;">🚪 Quitter / Uitloggen</button>
        </div>

        <div class="sub-tabs">
            <button class="sub-tab active" id="btn-w" onclick="switchSubTab('work')">HEURES / UREN</button>
            <button class="sub-tab" id="btn-v" onclick="switchSubTab('vacation')">CONGÉS / VERLOF</button>
        </div>

        <div id="form-work">
            <div class="info-week">
                <span>Reste à prester / Te presteren (39h)</span>
                <b id="stat-remaining-week">39h00</b>
            </div>
            <div class="card">
                <label>Date / Datum</label><input type="date" id="dateInput">
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;"><label>Arrivée / Aankomst</label><input type="time" id="startTime" value="08:00"></div>
                    <div style="flex:1;"><label>Départ / Vertrek</label><input type="time" id="endTime" value="16:30"></div>
                </div>
                <label>Lieu / Locatie</label>
                <select id="location"><option>Wemmel</option><option>Client</option><option>INEOS</option><option>Esso</option></select>
                <button class="btn-main" onclick="saveData()">ENREGISTRER / OPSLAAN</button>
            </div>
        </div>

        <div id="form-vacation" style="display:none;">
            <div class="info-week" style="border-top-color:var(--emerald);">
                <span>Solde Congés Légaux / Wettelijk verlof</span>
                <b id="vac-allowance">28 j</b>
            </div>
            <div class="card">
                <label>Type / Type</label>
                <select id="vacCategory"><option>Congés légaux</option><option>Jour férié</option><option>Malade</option><option>Récupération</option></select>
                <label>Du / Van</label><input type="date" id="vacStart">
                <label>Au / Tot</label><input type="date" id="vacEnd">
                <button class="btn-main" onclick="saveVacation()">VALIDER / BEVESTIGEN</button>
            </div>
        </div>
    </div>

    <div id="historique" class="content" style="display:none;">
        <div class="card">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <select id="selectMonth" onchange="renderTable()"></select>
                <select id="selectYear" onchange="renderTable()"></select>
            </div>
            <table>
                <thead><tr><th>Date</th><th>Lieu</th><th>Horaire</th><th>Réel</th><th>+/-</th><th class="delete-col"></th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div class="card" style="border-top: 4px solid var(--primary); font-weight:800;">
            <div style="display:flex; justify-content:space-between;">
                <span>Total: <span id="total-month-work">0h00</span></span>
                <span>+/- : <span id="total-month-diff">0h00</span></span>
            </div>
        </div>
        <button class="btn-main" onclick="window.print()">🖨️ PDF RAPPORT</button>
    </div>

    <div id="admin" class="content" style="display:none;">
        <div class="card"><h3>Admin - Users</h3><div id="user-list"></div></div>
    </div>
</div>

<nav class="tabs">
    <button class="tab active" onclick="openTab('saisie', this)"><span class="tab-icon">➕</span>POINTAGE</button>
    <button class="tab" onclick="openTab('historique', this)"><span class="tab-icon">📅</span>TABLEAU</button>
    <button class="tab" id="nav-admin" style="display:none;" onclick="openTab('admin', this)"><span class="tab-icon">⚙️</span>ADMIN</button>
</nav>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBPC6cJgFwBrSOppxE_kQDA2gs1ioEvGCw", authDomain: "worklog-fc54b.firebaseapp.com", databaseURL: "https://worklog-fc54b-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "worklog-fc54b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let user = null, entries = [];

    function handleAuth() {
        const uId = document.getElementById('loginUser').value.trim().toLowerCase();
        const pin = document.getElementById('loginPin').value;
        db.ref('users/' + uId).once('value', snap => {
            const d = snap.val();
            if (d && d.pin === pin) {
                if (!d.active && d.role !== 'admin') return alert("En attente de validation.");
                user = { id: uId, ...d };
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'block';
                document.getElementById('welcome-msg').innerText = user.prenom + " " + user.nom;
                if(user.role === 'admin') { document.getElementById('nav-admin').style.display = 'block'; loadAdminList(); }
                syncData();
            } else alert("Erreur PIN/User.");
        });
    }

    function syncData() {
        db.ref('users/' + user.id + '/entries').on('value', snap => {
            const data = snap.val();
            entries = data ? Object.values(data) : [];
            renderTable();
        });
    }

    async function saveData() {
        const d = document.getElementById('dateInput').value;
        const s = document.getElementById('startTime').value, e = document.getElementById('endTime').value;
        const l = document.getElementById('location').value;
        if(!d) return;
        const [h1, m1] = s.split(':').map(Number), [h2, m2] = e.split(':').map(Number);
        let min = (h2 * 60 + m2) - (h1 * 60 + m1) - (l === "Wemmel" ? 45 : 30);
        await db.ref('users/'+user.id+'/entries/'+d.replace(/-/g, '')).set({ date: d, location: l, minutes: min, isVacation: false, start: s, end: e });
        alert("Ok!");
    }

    async function saveVacation() {
        const sD = new Date(document.getElementById('vacStart').value), eD = new Date(document.getElementById('vacEnd').value);
        let curr = new Date(sD);
        while(curr <= eD) {
            if(curr.getDay() !== 0 && curr.getDay() !== 6) {
                const ds = curr.toISOString().split('T')[0];
                await db.ref('users/'+user.id+'/entries/'+ds.replace(/-/g, '')).set({ date: ds, location: document.getElementById('vacCategory').value, minutes: (curr.getDay() === 5 ? 420 : 480), isVacation: true, start: "N/A", end: "N/A" });
            }
            curr.setDate(curr.getDate() + 1);
        }
        alert("Ok!");
    }

    function renderTable() {
        const m = parseInt(document.getElementById('selectMonth').value), y = parseInt(document.getElementById('selectYear').value);
        const tBody = document.getElementById('tableBody'); tBody.innerHTML = '';
        let totalM = 0, totalD = 0, vacCount = 0, weekWork = 0;
        const now = new Date();
        const curMon = new Date(now); curMon.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1)); curMon.setHours(0,0,0,0);
        const curSun = new Date(curMon); curSun.setDate(curMon.getDate() + 6);
        const days = new Date(y, m + 1, 0).getDate();
        for (let i = 1; i <= days; i++) {
            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const dobj = new Date(y, m, i);
            const e = entries.find(x => x.date === ds);
            const goal = (dobj.getDay() >= 1 && dobj.getDay() <= 4) ? 480 : (dobj.getDay() === 5 ? 420 : 0);
            if(e) {
                totalM += e.minutes; totalD += (e.minutes - goal);
                if(e.isVacation && e.location === "Congés légaux") vacCount++;
                if(dobj >= curMon && dobj <= curSun) weekWork += e.minutes;
            }
            tBody.innerHTML += `<tr class="${(dobj.getDay()==0||dobj.getDay()==6)?'weekend':''}">
                <td>${i}/${m+1}</td>
                <td>${e ? e.location : ''}</td>
                <td>${(e && e.start && e.start !== "N/A") ? e.start + '-' + e.end : ''}</td>
                <td>${e ? formatT(e.minutes) : ''}</td>
                <td style="color:${(e && e.minutes-goal>=0)?'green':'red'}">${e ? formatT(e.minutes-goal) : ''}</td>
                <td class="delete-col">${e ? `<span onclick="deleteEntry('${e.date}')">🗑️</span>` : ''}</td>
            </tr>`;
        }
        document.getElementById('total-month-work').innerText = formatT(totalM);
        document.getElementById('total-month-diff').innerText = formatT(totalD);
        document.getElementById('vac-allowance').innerText = (28 - vacCount) + " j";
        const remWeek = 2340 - weekWork;
        document.getElementById('stat-remaining-week').innerText = remWeek <= 0 ? "OK" : formatT(remWeek);
    }

    function loadAdminList() {
        db.ref('users').on('value', snap => {
            const all = snap.val(); const list = document.getElementById('user-list'); list.innerHTML = "";
            for(let id in all) {
                const u = all[id];
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                    <span>${u.nom} ${u.prenom}</span>
                    <div>
                        ${!u.active ? `<button onclick="db.ref('users/${id}/active').set(true)">✅</button>` : ''}
                        <button onclick="if(confirm('Supprimer?')) db.ref('users/${id}').remove()">🗑️</button>
                    </div>
                </div>`;
            }
        });
    }

    function formatT(min) { const h = Math.floor(Math.abs(min)/60); const m = Math.round(Math.abs(min)%60); return `${min < 0 ? '-' : ''}${h}h${m.toString().padStart(2, '0')}`; }
    function openTab(id, btn) { document.querySelectorAll('.content').forEach(c => c.style.display = 'none'); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id).style.display = 'block'; btn.classList.add('active'); }
    function switchSubTab(t) { 
        document.getElementById('form-work').style.display = t === 'work' ? 'block' : 'none'; 
        document.getElementById('form-vacation').style.display = t === 'vacation' ? 'block' : 'none'; 
        document.getElementById('btn-w').classList.toggle('active', t==='work');
        document.getElementById('btn-v').classList.toggle('active', t==='vacation');
    }
    function initApp() {
        db.ref('users/burtonse').update({ nom: "BURTON", prenom: "Sean", pin: "0514", role: "admin", active: true });
        const mSel = document.getElementById('selectMonth');
        ["Jan.","Fév.","Mar.","Avr.","Mai","Juin","Juil.","Août","Sept.","Oct.","Nov.","Déc."].forEach((n, i) => mSel.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${n}</option>`);
        const ySel = document.getElementById('selectYear');
        for(let y = 2024; y <= 2026; y++) ySel.innerHTML += `<option value="${y}" ${y==new Date().getFullYear()?'selected':''}>${y}</option>`;
    }
    function showAuth(t) { document.getElementById('auth-login').style.display = t==='login'?'block':'none'; document.getElementById('auth-register').style.display = t==='register'?'block':'none'; }
    function handleRegister() {
        const uId = document.getElementById('regUser').value.trim().toLowerCase();
        db.ref('users/'+uId).set({ nom: document.getElementById('regNom').value.trim().toUpperCase(), prenom: document.getElementById('regPrenom').value.trim(), pin: document.getElementById('regPin').value, role: "user", active: false });
        alert("Demande envoyée."); showAuth('login');
    }
    async function deleteEntry(k) { if(confirm("Supprimer ?")) await db.ref('users/'+user.id+'/entries/'+k.replace(/-/g, '')).remove(); }
</script>
</body>
</html>
