<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dräger WorkLog Sync Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #003366; --secondary: #3498db; --success: #27ae60; --danger: #e74c3c; --draeger-blue: #005596; --draeger-bg: #fff9f0; --draeger-border: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        #login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; }
        .container { background: white; padding: 15px; border-radius: 15px; width: 100%; max-width: 500px; display: none; box-sizing: border-box; }
        .user-info { border-bottom: 2px solid var(--draeger-blue); padding-bottom: 10px; margin-bottom: 15px; }
        .user-info .name { font-weight: bold; font-size: 1.1em; color: var(--draeger-blue); }
        .lang-switch { display: flex; gap: 5px; justify-content: flex-end; margin-bottom: 10px; align-items: center; }
        .lang-btn { padding: 5px 12px; border: 1px solid #ddd; border-radius: 5px; background: white; font-weight: bold; cursor: pointer; }
        .lang-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); }
        .tabs { display: flex; margin-bottom: 15px; border-bottom: 1px solid #ddd; }
        .tab { flex: 1; padding: 12px; text-align: center; border: none; background: none; font-weight: bold; color: #777; cursor: pointer; }
        .tab.active { color: var(--secondary); border-bottom: 3px solid var(--secondary); }
        .content { display: none; }
        .content.active { display: block; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85em; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; }
        .checkbox-group { display: flex; align-items: center; gap: 15px; background: var(--draeger-bg); padding: 12px; border-radius: 10px; border: 1px solid var(--draeger-border); margin-bottom: 15px; cursor: pointer; width: 100%; box-sizing: border-box; }
        .checkbox-group input { width: 22px; height: 22px; }
        .summary-box { display: flex; gap: 10px; margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px; }
        .summary-item { flex: 1; background: #f8f9fa; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #eee; }
        .btn-main { width: 100%; background: var(--secondary); color: white; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; margin-top: 10px; table-layout: fixed; }
        th, td { border: 1px solid #eee; padding: 8px 4px; text-align: center; }
        tr.total-row { background: #eee; font-weight: bold; border-top: 2px solid #333; }
        .weekend { background: #fdfdfd; color: #ccc; }
        .holiday-row { background: #eef7ff; font-weight: 600; color: #005596; }
        .counter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; background: #f8f9fa; padding: 12px; border-radius: 10px; border: 1px solid #ddd; }
        #conge-alert { display: none; background: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.85em; font-weight: bold; text-align: center; border: 1px solid #f87171; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color:var(--primary);">WorkLog Cloud</h2>
        <input type="text" id="loginUser" placeholder="ID (ex: burtonse)" style="margin-bottom:10px;">
        <input type="password" id="loginPass" placeholder="PIN" style="margin-bottom:20px;">
        <button class="btn-main" onclick="checkLogin()">Connexion</button>
        <p id="loginError" style="color:var(--danger); display:none; font-size: 0.8em; margin-top:10px;">Accès refusé</p>
    </div>
</div>

<div class="container" id="mainContainer">
    <div class="lang-switch">
        <div style="font-size: 0.65em; color: #27ae60; font-weight: bold; margin-right: auto;">● Sync Connecté</div>
        <button class="lang-btn" id="btn-fr" onclick="setLanguage('fr')">FR</button>
        <button class="lang-btn" id="btn-nl" onclick="setLanguage('nl')">NL</button>
    </div>

    <div class="user-info">
        <span class="name" id="userNameDisp"></span>
    </div>

    <div class="tabs">
        <button class="tab active" id="tab-saisie" onclick="openTab('saisie')">Saisie</button>
        <button class="tab" id="tab-historique" onclick="openTab('historique')">Tableau</button>
    </div>

    <div id="saisie" class="content active">
        <div class="input-group"><label>Date</label><input type="date" id="date"></div>
        <div class="input-group">
            <label>Lieu / Type</label>
            <select id="location">
                <option value="Wemmel">Wemmel (45m)</option>
                <option value="Esso">Esso (30m)</option>
                <option value="INEOS">INEOS (30m)</option>
                <option value="Autre">Autre / Overig (30m)</option>
                <option value="CONGE">🌴 Congé / Férié / Maladie</option>
            </select>
        </div>
        
        <div class="checkbox-group" id="clientContainer" onclick="toggleCheckbox()">
            <input type="checkbox" id="isClient" onchange="updateLabels(); handleCheckboxStyle();" onclick="event.stopPropagation()">
            <div style="display:flex; flex-direction:column; text-align:left;">
                <span id="label-isclient" style="font-weight: bold; font-size: 0.9em;"></span>
                <span id="label-isclient-sub" style="font-size: 0.75em; color: #666;"></span>
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex:1;"><label id="labelStart">Début</label><input type="time" id="startTime" value="08:00"></div>
            <div class="input-group" style="flex:1;"><label id="labelEnd">Fin</label><input type="time" id="endTime" value="16:30"></div>
        </div>
        
        <button class="btn-main" id="btn-save" onclick="addEntry()">Enregistrer & Synchroniser</button>
        <div class="summary-box" id="weeklySummary"></div>
    </div>

    <div id="historique" class="content">
        <div id="conge-alert">⚠️ Alerte : Quota de congés dépassé !</div>
        <div class="counter-grid">
            <div>🌴 Congés (Légaux): <b id="stat-legal">0/20</b></div>
            <div>⏳ ADV (39h): <b id="stat-adv">0</b></div>
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <select id="selectMonth" style="flex: 2;" onchange="renderMonthlyTable()"></select>
            <select id="selectYear" style="flex: 1;" onchange="renderMonthlyTable()"></select>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th style="width:60px;">Date</th><th>Heures</th><th>Total</th><th>Overtime</th><th style="width:30px;"></th></tr>
                </thead>
                <tbody id="monthlyTableBody"></tbody>
                <tfoot id="monthlyFooter"></tfoot>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBPC6cJgFwBrSOppxE_kQDA2gs1ioEvGCw",
        authDomain: "worklog-fc54b.firebaseapp.com",
        databaseURL: "https://worklog-fc54b-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "worklog-fc54b",
        storageBucket: "worklog-fc54b.firebasestorage.app",
        messagingSenderId: "1031734193051",
        appId: "1:1031734193051:web:6a8df0f57aa4d63796cf3e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const USER_DB = { "burtonse": { pass: "0514", name: "Sean Burton" } };
    let entries = [];
    let currentUserId = "";
    let currentLang = localStorage.getItem('userLang') || 'fr';

    function checkLogin() {
        const u = document.getElementById('loginUser').value.toLowerCase();
        const p = document.getElementById('loginPass').value;
        if(USER_DB[u] && USER_DB[u].pass === p) {
            currentUserId = u;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            document.getElementById('userNameDisp').innerText = USER_DB[u].name;
            loadData();
            setLanguage(currentLang);
        } else { document.getElementById('loginError').style.display = 'block'; }
    }

    function loadData() {
        db.ref('users/' + currentUserId + '/entries').on('value', (snapshot) => {
            const data = snapshot.val();
            entries = data ? Object.values(data) : [];
            updateWeeklyStatus();
            calculateHolidayStats();
            renderMonthlyTable();
        });
    }

    function addEntry() {
        const d = document.getElementById('date').value;
        const s = document.getElementById('startTime').value;
        const e = document.getElementById('endTime').value;
        const l = document.getElementById('location').value;
        const c = document.getElementById('isClient').checked;
        if (!d || !s || !e) return;
        let diff = (new Date(`${d}T${e}`) - new Date(`${d}T${s}`)) / 60000;
        if (l === "CONGE") { diff = 468; } else { if (c) diff -= 60; diff -= (l === "Wemmel") ? 45 : 30; }
        const entry = { date: d, location: l, minutes: diff, start: s, end: e, isClient: c };
        db.ref('users/' + currentUserId + '/entries/' + d.replace(/-/g, '')).set(entry).then(() => {
            const btn = document.getElementById('btn-save');
            btn.style.background = "#27ae60"; btn.innerText = "✅ Synchronisé !";
            setTimeout(() => { btn.style.background = ""; setLanguage(currentLang); }, 2000);
        });
    }

    function calculateHolidayStats() {
        const curY = new Date().getFullYear();
        const yearConge = entries.filter(e => e.date.startsWith(curY) && e.location === "CONGE").length;
        const activeMonths = new Set(entries.filter(e => e.location !== "CONGE" && e.date.startsWith(curY)).map(e => e.date.substring(0, 7))).size;
        const advEarned = Math.floor(activeMonths / 2);
        const totalQuota = 20 + advEarned;
        
        document.getElementById('stat-legal').innerText = `${yearConge}/20`;
        document.getElementById('stat-adv').innerText = advEarned;
        document.getElementById('conge-alert').style.display = (yearConge > totalQuota) ? "block" : "none";
    }

    function formatTime(min) {
        const h = Math.floor(Math.abs(min) / 60);
        const m = Math.round(Math.abs(min) % 60);
        return `${min < 0 ? '-' : ''}${h}h${m.toString().padStart(2, '0')}`;
    }

    function updateWeeklyStatus() {
        const now = new Date();
        const start = new Date(now);
        start.setDate(now.getDate() - (now.getDay() || 7) + 1);
        start.setHours(0,0,0,0);
        const weeklyMin = entries.reduce((sum, e) => {
            const ed = new Date(e.date);
            return (ed >= start && ed <= new Date(start).setDate(start.getDate()+6)) ? sum + (e.minutes || 0) : sum;
        }, 0);
        const rem = (39 * 60) - weeklyMin;
        document.getElementById('weeklySummary').innerHTML = `
            <div class="summary-item"><span style="font-size:0.75em;">Fait (Sem)</span><br><b>${formatTime(weeklyMin)}</b></div>
            <div class="summary-item"><span style="font-size:0.75em;">Reste / 39h</span><br><b style="color:${rem > 0 ? '#f39c12' : '#27ae60'}">${rem > 0 ? formatTime(rem) : 'OK'}</b></div>`;
    }

    function renderMonthlyTable() {
        const m = parseInt(document.getElementById('selectMonth').value);
        const y = parseInt(document.getElementById('selectYear').value);
        const tbody = document.getElementById('monthlyTableBody');
        const tfoot = document.getElementById('monthlyFooter');
        tbody.innerHTML = '';
        let totalMin = 0; let totalSupp = 0;
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        const daysFr = ["Di", "Lu", "Ma", "Me", "Je", "Ve", "Sa"];

        for (let i = 1; i <= daysInMonth; i++) {
            const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const entry = entries.find(e => e.date === dateStr);
            const dObj = new Date(y, m, i);
            const dNum = dObj.getDay();
            let goal = (dNum === 0 || dNum === 6) ? 0 : (dNum === 5 ? 420 : 480);
            
            if(entry) {
                totalMin += entry.minutes;
                totalSupp += (entry.minutes - goal);
            }

            let rowClass = (dNum === 0 || dNum === 6) ? 'weekend' : (entry && entry.location === 'CONGE' ? 'holiday-row' : '');
            tbody.innerHTML += `<tr class="${rowClass}">
                <td>${daysFr[dNum]} ${i}</td>
                <td>${entry ? (entry.location === 'CONGE' ? '🌴 CONGÉ' : entry.start + '-' + entry.end) : '-'}</td>
                <td>${entry ? formatTime(entry.minutes) : '-'}</td>
                <td style="color:${(entry && (entry.minutes-goal)>0) ? 'green' : ((entry && (entry.minutes-goal)<0) ? 'red' : 'black')}">${entry ? formatTime(entry.minutes - goal) : '-'}</td>
                <td><span onclick="deleteEntry('${dateStr}')" style="cursor:pointer; color:red;">✕</span></td>
            </tr>`;
        }

        tfoot.innerHTML = `<tr class="total-row">
            <td colspan="2">TOTAL MENSUEL</td>
            <td>${formatTime(totalMin)}</td>
            <td style="color:${totalSupp >= 0 ? 'green' : 'red'}">${formatTime(totalSupp)}</td>
            <td></td>
        </tr>`;
    }

    function setLanguage(l) {
        currentLang = l;
        const t = { fr: { cl: "🚗 Déplacement Client", sb: "(-1h trajet)", sv: "Enregistrer & Synchroniser" }, nl: { cl: "🚗 Klantverplaatsing", sb: "(-1u reistijd)", sv: "Opslaan & Sync" } };
        document.getElementById('label-isclient').innerText = t[l].cl;
        document.getElementById('label-isclient-sub').innerText = t[l].sb;
        document.getElementById('btn-save').innerText = t[l].sv;
        renderMonthlyTable();
    }

    function deleteEntry(d) { if(confirm("Supprimer ?")) db.ref('users/' + currentUserId + '/entries/' + d.replace(/-/g, '')).remove(); }
    function toggleCheckbox() { document.getElementById('isClient').checked = !document.getElementById('isClient').checked; handleCheckboxStyle(); }
    function handleCheckboxStyle() { const c = document.getElementById('clientContainer'); document.getElementById('isClient').checked ? c.classList.add('active') : c.classList.remove('active'); }
    function openTab(id) { document.querySelectorAll('.content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); event.currentTarget.classList.add('active'); }

    const mSel = document.getElementById('selectMonth');
    ["Janv", "Févr", "Mars", "Avril", "Mai", "Juin", "Juil", "Août", "Sept", "Oct", "Nov", "Déc"].forEach((m, i) => mSel.innerHTML += `<option value="${i}" ${i == new Date().getMonth() ? 'selected' : ''}>${m}</option>`);
    const ySel = document.getElementById('selectYear');
    [2025, 2026].forEach(y => ySel.innerHTML += `<option value="${y}" ${y === new Date().getFullYear() ? 'selected' : ''}>${y}</option>`);
    document.getElementById('date').valueAsDate = new Date();
</script>
</body>
</html>
