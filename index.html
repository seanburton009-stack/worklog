<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dräger WorkLog V61</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        /* --- VARIABLES DE THEME --- */
        :root {
            --primary: #003366;
            --secondary: #005eb8;
            --bg: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #64748b;
            --border: #e1e8ed;
            --danger: #d9534f;
            --emerald: #2ecc71;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --input-bg: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.85);
        }

        /* Classe forcée par le bouton manuel */
        body.dark-mode {
            --bg: #0b141d;
            --card-bg: #1a2632;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border: #2d3d4d;
            --input-bg: #243442;
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
            --nav-bg: rgba(26, 38, 50, 0.9);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        /* --- BOUTON THEME --- */
        .theme-toggle {
            background: var(--border);
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- AUTHENTICATION --- */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        /* --- LAYOUT --- */
        .container {
            padding: 20px 16px 140px 16px;
            max-width: 600px;
            margin: auto;
            display: none;
        }

        .card {
            background: var(--card-bg);
            border-radius: 22px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        /* --- INPUTS --- */
        input, select {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 17px;
            margin-bottom: 15px;
            display: block;
            background: var(--input-bg);
            color: var(--text-main);
            outline: none;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.8em;
            color: var(--secondary);
            text-transform: uppercase;
        }

        .btn-main {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 18px;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        /* --- NAVIGATION --- */
        .tabs {
            display: flex;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 12px 10px calc(12px + env(safe-area-inset-bottom)) 10px;
            border-top: 0.5px solid var(--border);
            z-index: 1000;
        }

        .tab {
            flex: 1; border: none; background: none;
            font-size: 11px; color: var(--text-sub);
            font-weight: 600;
        }

        .tab.active { color: var(--secondary); }
        .tab-icon { font-size: 22px; display: block; margin-bottom: 4px; }

        /* --- SWITCH iOS --- */
        .toggle-row { display: flex; justify-content: space-between; align-items: center; }
        .ios-switch {
            width: 50px; height: 30px; appearance: none;
            background: #ccc; border-radius: 20px;
            position: relative; transition: 0.3s;
        }
        .ios-switch:checked { background: var(--emerald); }
        .ios-switch::before {
            content: ''; position: absolute; width: 26px; height: 26px;
            background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s;
        }
        .ios-switch:checked::before { left: 22px; }

        @media print {
            .tabs, .btn-main, .theme-toggle, .lang-switch, #login-overlay { display: none !important; }
            .container { display: block !important; width: 100%; color: black; background: white; }
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="box" id="auth-login">
        <h2 style="color:white; margin-bottom:20px;">Dräger RSS</h2>
        <input type="text" id="loginUser" placeholder="Utilisateur">
        <input type="password" id="loginPin" maxlength="4" placeholder="PIN" inputmode="numeric">
        <button class="btn-main" onclick="handleAuth()">LOGIN</button>
        <div style="margin-top:15px;">
            <a onclick="showAuth('register')" style="color:rgba(255,255,255,0.8); cursor:pointer; font-size: 0.9em;">+ Créer un compte</a>
        </div>
    </div>

    <div class="box" id="auth-register" style="display:none;">
        <h2 style="color:var(--primary);">Nouveau Compte</h2>
        <input type="text" id="regNom" placeholder="NOM">
        <input type="text" id="regPrenom" placeholder="Prénom">
        <input type="text" id="regUser" placeholder="User">
        <input type="password" id="regPin" maxlength="4" placeholder="PIN" inputmode="numeric">
        <button class="btn-main" onclick="handleRegister()">VALIDER</button>
        <button class="btn-main" style="background:#ccc; color:#333;" onclick="showAuth('login')">RETOUR</button>
    </div>
</div>

<div class="container" id="mainContainer">
    
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <b id="welcome-msg" style="font-size: 1.2em;">...</b>
        <div style="display:flex; gap:10px;">
            <button class="theme-toggle" onclick="toggleDarkMode()" id="themeBtn">🌙</button>
            <select id="langSelect" onchange="toggleLang(true)" style="margin:0; width:auto; padding:5px 10px;">
                <option value="fr">FR</option>
                <option value="nl">NL</option>
            </select>
        </div>
    </div>

    <div id="saisie" class="content">
        <div class="card">
            <label id="lbl-date">Date</label>
            <input type="date" id="dateInput">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label id="lbl-start">Départ</label><input type="time" id="startTime" value="08:00"></div>
                <div style="flex:1;"><label id="lbl-end">Retour</label><input type="time" id="endTime" value="16:30"></div>
            </div>
            <label id="lbl-loc">Lieu</label>
            <select id="location">
                <option>Wemmel</option><option>Client</option><option>INEOS</option><option>Esso</option>
            </select>
            <div class="card" style="margin: 0 0 15px 0; padding: 15px; background: rgba(0,0,0,0.03);">
                <div class="toggle-row">
                    <span id="txt-sh">Départ Maison (-30m)</span>
                    <input type="checkbox" id="startHome" class="ios-switch">
                </div>
                <div class="toggle-row" style="margin-top:15px;">
                    <span id="txt-eh">Retour Maison (-30m)</span>
                    <input type="checkbox" id="endHome" class="ios-switch">
                </div>
            </div>
            <button class="btn-main" onclick="saveData()" id="btn-save-work">ENREGISTRER</button>
        </div>
    </div>

    <div id="historique" class="content" style="display:none;">
        <div class="card">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <select id="selectMonth" onchange="renderTable()"></select>
                <select id="selectYear" onchange="renderTable()"></select>
            </div>
            <table id="mainTable">
                <thead>
                    <tr><th id="th-date">Date</th><th id="th-loc">Lieu</th><th id="th-real">H</th><th>+/-</th><th class="delete-col"></th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <button class="btn-main" onclick="window.print()">🖨️ GÉNÉRER PDF</button>
    </div>
</div>

<nav class="tabs">
    <button class="tab active" onclick="openTab('saisie', this)"><span class="tab-icon">🕒</span><span id="nav-p">LOG</span></button>
    <button class="tab" onclick="openTab('historique', this)"><span class="tab-icon">📊</span><span id="nav-t">TABLEAU</span></button>
</nav>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = { 
        apiKey: "AIzaSyBPC6cJgFwBrSOppxE_kQDA2gs1ioEvGCw", 
        authDomain: "worklog-fc54b.firebaseapp.com", 
        databaseURL: "https://worklog-fc54b-default-rtdb.europe-west1.firebasedatabase.app/", 
        projectId: "worklog-fc54b" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = null, entries = [], currentLang = 'fr';

    // --- DARK MODE LOGIC ---
    function toggleDarkMode() {
        const isDark = document.body.classList.toggle('dark-mode');
        document.getElementById('themeBtn').innerText = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // --- INIT ---
    function initApp() {
        // Appliquer thème sauvegardé
        if(localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeBtn').innerText = '☀️';
        }
        
        const mSel = document.getElementById('selectMonth');
        const months = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
        months.forEach((n, i) => mSel.innerHTML += `<option value="${i}" ${i == new Date().getMonth() ? 'selected' : ''}>${n}</option>`);
        
        const ySel = document.getElementById('selectYear');
        const cy = new Date().getFullYear();
        for (let y = cy - 1; y <= cy + 1; y++) ySel.innerHTML += `<option value="${y}" ${y == cy ? 'selected' : ''}>${y}</option>`;
    }

    // --- AUTH ---
    function handleAuth() {
        const uId = document.getElementById('loginUser').value.trim().toLowerCase();
        const pin = document.getElementById('loginPin').value;
        db.ref('users/' + uId).once('value', snap => {
            const d = snap.val();
            if (d && d.pin === pin) {
                user = { id: uId, ...d };
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'block';
                document.getElementById('welcome-msg').innerText = "Salut " + user.prenom;
                syncData();
            } else alert("Erreur identifiants");
        });
    }

    function syncData() {
        db.ref('users/' + user.id + '/entries').on('value', snap => {
            entries = snap.val() ? Object.values(snap.val()) : [];
            renderTable();
        });
    }

    async function saveData() {
        const d = document.getElementById('dateInput').value;
        if(!d) return alert("Choisis une date");
        const s = document.getElementById('startTime').value, e = document.getElementById('endTime').value;
        const [h1, m1] = s.split(':').map(Number), [h2, m2] = e.split(':').map(Number);
        let total = (h2 * 60 + m2) - (h1 * 60 + m1) - 30; // -30 min pause standard
        if(document.getElementById('startHome').checked) total -= 30;
        if(document.getElementById('endHome').checked) total -= 30;

        await db.ref('users/' + user.id + '/entries/' + d.replace(/-/g, '')).set({
            date: d, location: document.getElementById('location').value, minutes: total, start: s, end: e
        });
        alert("Enregistré !");
    }

    function renderTable() {
        const tBody = document.getElementById('tableBody');
        tBody.innerHTML = '';
        const m = parseInt(document.getElementById('selectMonth').value);
        const y = parseInt(document.getElementById('selectYear').value);
        
        entries.filter(e => new Date(e.date).getMonth() === m).forEach(e => {
            tBody.innerHTML += `<tr>
                <td>${e.date.split('-')[2]}</td>
                <td>${e.location}</td>
                <td>${Math.floor(e.minutes/60)}h${(e.minutes%60).toString().padStart(2,'0')}</td>
                <td>-</td>
                <td class="delete-col"><button onclick="deleteEntry('${e.date}')">🗑️</button></td>
            </tr>`;
        });
    }

    function openTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
    }

    async function deleteEntry(date) {
        if(confirm("Supprimer ?")) await db.ref('users/'+user.id+'/entries/'+date.replace(/-/g,'')).remove();
    }

    window.onload = initApp;
</script>
</body>
</html>
