<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dräger WorkLog V38 - Admin Control</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #003366; --secondary: #005eb8; --bg: #f4f7f9; --danger: #d9534f; --success: #28a745; --shadow: 0 4px 12px rgba(0,0,0,0.08); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        #login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; box-shadow: var(--shadow); }
        
        .container { padding: 20px 15px 120px 15px; max-width: 800px; margin: auto; display: none; }
        .card { background: white; border-radius: 18px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
        
        input, select { width: 100%; padding: 12px; border: 1.5px solid #e1e8ed; border-radius: 12px; font-size: 16px; margin-bottom: 12px; }
        .btn-main { width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 15px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; }
        
        .tabs { display: flex; background: white; position: fixed; bottom: 0; left: 0; right: 0; padding: 10px; border-top: 1px solid #e1e8ed; }
        .tab { flex: 1; border: none; background: none; font-size: 10px; color: #94a3b8; text-align: center; }
        .tab.active { color: var(--secondary); font-weight: 800; }

        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .pending { background: #fff5f5; border-left: 4px solid var(--danger); }
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 0.7em; font-weight: bold; }
        .badge-admin { background: #003366; color: white; }
    </style>
</head>
<body onload="initApp()">

<div id="login-overlay">
    <div class="box" id="auth-login">
        <h2 style="color:var(--primary);">Dräger RSS</h2>
        <input type="text" id="loginUser" placeholder="Utilisateur (ex: burtonse)">
        <input type="password" id="loginPin" maxlength="4" placeholder="PIN (ex: 0514)">
        <button class="btn-main" onclick="handleAuth()">Connexion</button>
        <div style="margin-top:15px;"><a onclick="showAuth('register')" style="font-size:0.8em; color:var(--secondary); cursor:pointer;">+ Créer un compte</a></div>
    </div>

    <div class="box" id="auth-register" style="display:none;">
        <h2>Nouveau Profil</h2>
        <input type="text" id="regNom" placeholder="NOM">
        <input type="text" id="regPrenom" placeholder="Prénom">
        <input type="text" id="regUser" placeholder="Utilisateur choisi">
        <input type="password" id="regPin" maxlength="4" placeholder="PIN (4 chiffres)">
        <button class="btn-main" onclick="handleRegister()">Demander l'accès</button>
        <button class="btn-main" style="background:#ccc; margin-top:10px;" onclick="showAuth('login')">Retour</button>
    </div>
</div>

<div class="container" id="mainContainer">
    <div id="saisie" class="content active">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <b id="welcome-msg">...</b>
            <button onclick="location.reload()" style="color:red; border:none; background:none; font-weight:bold;">Quitter</button>
        </div>
        <div class="card">
            <label>Date</label><input type="date" id="dateInput">
            <button class="btn-main" onclick="saveData()">Enregistrer journée</button>
        </div>
    </div>

    <div id="admin" class="content" style="display:none;">
        <div class="card">
            <h3>Gestion des accès</h3>
            <div id="user-list"></div>
        </div>
    </div>
</div>

<nav class="tabs">
    <button class="tab active" onclick="openTab('saisie', this)">➕ POINTER</button>
    <button class="tab" id="nav-admin" style="display:none;" onclick="openTab('admin', this)">⚙️ ADMIN</button>
</nav>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBPC6cJgFwBrSOppxE_kQDA2gs1ioEvGCw", authDomain: "worklog-fc54b.firebaseapp.com", databaseURL: "https://worklog-fc54b-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "worklog-fc54b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let user = null;

    function showAuth(t) { document.getElementById('auth-login').style.display = t==='login'?'block':'none'; document.getElementById('auth-register').style.display = t==='register'?'block':'none'; }

    function handleAuth() {
        const uId = document.getElementById('loginUser').value.trim().toLowerCase();
        const pin = document.getElementById('loginPin').value;
        
        db.ref('users/' + uId).once('value', snap => {
            const d = snap.val();
            if (d && d.pin === pin) {
                if (d.role !== 'admin' && d.active === false) {
                    return alert("Votre compte est en attente de validation par l'administrateur.");
                }
                user = { id: uId, ...d };
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'block';
                document.getElementById('welcome-msg').innerText = user.prenom + " " + user.nom;
                if(user.role === 'admin') {
                    document.getElementById('nav-admin').style.display = 'block';
                    loadAdminList();
                }
            } else {
                alert("Identifiants incorrects.");
            }
        });
    }

    function handleRegister() {
        const uId = document.getElementById('regUser').value.trim().toLowerCase();
        const data = { 
            nom: document.getElementById('regNom').value.trim().toUpperCase(),
            prenom: document.getElementById('regPrenom').value.trim(),
            pin: document.getElementById('regPin').value,
            role: "user",
            active: false 
        };
        db.ref('users/'+uId).set(data).then(() => { 
            alert("Demande envoyée ! Sean doit valider votre compte."); 
            showAuth('login'); 
        });
    }

    function loadAdminList() {
        db.ref('users').on('value', snap => {
            const all = snap.val();
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            for(let id in all) {
                const u = all[id];
                list.innerHTML += `
                    <div class="user-item ${!u.active && u.role !== 'admin' ? 'pending' : ''}">
                        <div>
                            <b>${u.nom} ${u.prenom}</b><br>
                            <small>ID: ${id} | ${u.role}</small>
                        </div>
                        <div>
                            ${(!u.active && u.role !== 'admin') ? `<button onclick="approveUser('${id}')" style="background:green; color:white; border:none; padding:5px; border-radius:5px;">✅ Valider</button>` : ''}
                            <button onclick="deleteUser('${id}')" style="background:red; color:white; border:none; padding:5px; border-radius:5px; margin-left:5px;">🗑️</button>
                        </div>
                    </div>`;
            }
        });
    }

    function approveUser(id) { db.ref('users/'+id+'/active').set(true); }
    function deleteUser(id) { if(id !== 'burtonse' && confirm("Supprimer ?")) db.ref('users/'+id).remove(); }
    function openTab(id, btn) { document.querySelectorAll('.content').forEach(c => c.style.display = 'none'); document.getElementById(id).style.display = 'block'; }

    function initApp() {
        // Forcer tes droits admin à chaque chargement pour être sûr
        db.ref('users/burtonse').update({ 
            nom: "BURTON", 
            prenom: "Sean", 
            pin: "0514", 
            role: "admin", 
            active: true 
        });
    }
</script>
</body>
</html>
