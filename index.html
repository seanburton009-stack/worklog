<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dräger WorkLog V36 - Sean Burton</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #003366; --secondary: #005eb8; --bg: #f4f7f9; --danger: #d9534f; --success: #28a745; --emerald: #2ecc71; --shadow: 0 4px 12px rgba(0,0,0,0.08); }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        
        #login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 2000; overflow-y: auto; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; box-shadow: var(--shadow); }
        
        .container { padding: 20px 15px 120px 15px; max-width: 650px; margin: auto; display: none; }
        .card { background: white; border-radius: 18px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
        
        label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 0.8em; color: var(--primary); text-transform: uppercase; text-align: left; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #e1e8ed; border-radius: 12px; font-size: 16px; margin-bottom: 12px; }
        
        .btn-main { width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 15px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .btn-sec { background: #e2e8f0; color: #475569; margin-top: 10px; }
        
        .auth-links { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .auth-links a { color: var(--secondary); font-size: 0.85em; text-decoration: none; font-weight: 600; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; }
        th { font-size: 0.7em; padding: 10px; color: #64748b; border-bottom: 2px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 0.85em; }
        .weekend { background: #f8fafc !important; }

        .tabs { display: flex; background: white; position: fixed; bottom: 0; left: 0; right: 0; padding: 10px; border-top: 1px solid #e1e8ed; z-index: 1000; }
        .tab { flex: 1; border: none; background: none; font-size: 11px; color: #94a3b8; text-align: center; }
        .tab.active { color: var(--secondary); font-weight: 800; }

        @media print {
            .tabs, .btn-main, .delete-col, #login-overlay, .top-bar, .sub-tabs, .filter-row, .stat-grid { display: none !important; }
            #pdf-header, #pdf-footer { display: block !important; }
            .container { display: block !important; padding: 0; }
            table { border: 1px solid #000; width: 100%; }
            th, td { border: 1px solid #ccc; color: black !important; }
        }
    </style>
</head>
<body onload="initApp()">

<div id="login-overlay">
    <div class="box" id="auth-login">
        <h2 style="color:var(--primary);">Dräger RSS</h2>
        <input type="text" id="loginUser" placeholder="Utilisateur">
        <input type="password" id="loginPin" maxlength="4" placeholder="PIN">
        <button class="btn-main" onclick="handleAuth()">Connexion</button>
        <div class="auth-links">
            <a onclick="showAuth('register')">+ Créer un nouvel utilisateur</a>
            <a onclick="showAuth('reset')">PIN oublié ?</a>
        </div>
    </div>

    <div class="box" id="auth-register" style="display:none;">
        <h2>Nouveau Profil</h2>
        <input type="text" id="regNom" placeholder="NOM">
        <input type="text" id="regPrenom" placeholder="Prénom">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="text" id="regUser" placeholder="Nom d'utilisateur">
        <input type="password" id="regPin" maxlength="4" placeholder="PIN (4 chiffres)">
        <button class="btn-main" onclick="handleRegister()">Créer le compte</button>
        <button class="btn-main btn-sec" onclick="showAuth('login')">Annuler</button>
    </div>

    <div class="box" id="auth-reset" style="display:none;">
        <h2>Réinitialiser PIN</h2>
        <input type="text" id="resetUser" placeholder="Utilisateur">
        <input type="email" id="resetEmail" placeholder="Email enregistré">
        <input type="text" id="resetNom" placeholder="NOM (Majuscules)">
        <input type="password" id="resetPin" maxlength="4" placeholder="Nouveau PIN">
        <button class="btn-main" onclick="handleReset()">Changer le PIN</button>
        <button class="btn-main btn-sec" onclick="showAuth('login')">Retour</button>
    </div>
</div>

<div id="pdf-header" style="display:none; padding: 20px;">
    <h1 id="pdf-user-display">--</h1>
    <p>Service Engineer - Logistic Support RSS</p>
    <p id="pdf-title-date" style="font-weight:bold; border-bottom:2px solid black; padding-bottom:5px;">Résumé</p>
</div>

<div class="container" id="mainContainer">
    <div id="saisie" class="content active">
        <div class="top-bar" style="display:flex; justify-content:space-between; margin-bottom:20px;">
             <button onclick="softLogout()" style="border:none; background:none; color:#64748b; font-weight:bold; cursor:pointer;">🚪 Déconnexion</button>
             <button onclick="toggleLang()" style="border:none; background:var(--primary); color:white; padding:8px 12px; border-radius:10px; cursor:pointer;">🌐 FR/NL</button>
        </div>
        
        <div class="sub-tabs" style="display: flex; gap: 10px; margin-bottom: 20px; background: #e2e8f0; padding: 5px; border-radius: 12px;">
            <button class="sub-tab active" id="btn-work-tab" onclick="switchSubTab('work')" style="flex:1; padding:10px; border:none; border-radius:8px; font-weight:bold;">Travail</button>
            <button class="sub-tab" id="btn-vac-tab" onclick="switchSubTab('vacation')" style="flex:1; padding:10px; border:none; border-radius:8px; font-weight:bold;">Congés</button>
        </div>

        <div class="info-week">
            <span id="txt-rem-week">Reste à prester (Semaine)</span>
            <b id="stat-remaining-ptr">--h--</b>
        </div>

        <div id="form-work" class="card">
            <label>Date</label><input type="date" id="dateInput">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>Arrivée</label><input type="time" id="startTime" value="08:00"></div>
                <div style="flex:1;"><label>Départ</label><input type="time" id="endTime" value="16:30"></div>
            </div>
            <label>Lieu</label>
            <select id="location"><option>Wemmel</option><option>Client</option><option>INEOS</option><option>Esso</option></select>
            <button class="btn-main" onclick="saveData()">Enregistrer</button>
        </div>

        <div id="form-vacation" class="card" style="display:none;">
            <label>Catégorie</label><select id="vacCategory"></select>
            <label>Du</label><input type="date" id="vacStart">
            <label>Au</label><input type="date" id="vacEnd">
            <button class="btn-main" onclick="saveVacation()">Enregistrer</button>
        </div>
    </div>

    <div id="historique" class="content" style="display:none;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
            <div class="card" style="margin-bottom:0; text-align:center;">
                <span style="font-size:0.7em; color:gray; text-transform:uppercase;">Heures Supp</span>
                <b id="stat-month-over" style="display:block; font-size:1.4em; color:var(--secondary);">0h00</b>
            </div>
            <div class="card" style="margin-bottom:0; text-align:center;">
                <span style="font-size:0.7em; color:gray; text-transform:uppercase;">Congés pris</span>
                <b id="stat-month-vac" style="display:block; font-size:1.4em; color:var(--emerald);">0</b>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <select id="selectMonth" onchange="renderTable()"></select>
                <select id="selectYear" onchange="renderTable()"></select>
            </div>
            <table>
                <thead><tr><th>Date</th><th>Détails</th><th>Réel</th><th>+/-</th><th class="delete-col"></th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <button class="btn-main" onclick="window.print()">🖨️ Générer Rapport PDF</button>

        <div id="pdf-footer" style="display:none; margin-top:20px; border-top:2px solid black; padding-top:10px;">
            <div style="display:flex; justify-content:space-between; font-weight:bold;">
                <span>Total presté : <span id="pdf-total-preste">0h00</span></span>
                <span>Total Supp : <span id="pdf-total-supp">0h00</span></span>
            </div>
        </div>
    </div>
</div>

<nav class="tabs">
    <button class="tab active" id="nav-ptr" onclick="openTab('saisie', this)">➕ POINTER</button>
    <button class="tab" id="nav-cal" onclick="openTab('historique', this)">📅 TABLEAU</button>
</nav>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBPC6cJgFwBrSOppxE_kQDA2gs1ioEvGCw", authDomain: "worklog-fc54b.firebaseapp.com", databaseURL: "https://worklog-fc54b-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "worklog-fc54b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let entries = [];
    let user = null;
    let lang = localStorage.getItem('lang_drager') || 'fr';

    // --- AUTO-SET SEAN BURTON ---
    function checkSeanAccount() {
        const seanId = "burtonse";
        db.ref('users/' + seanId).once('value', snap => {
            if(!snap.exists()) {
                db.ref('users/' + seanId).set({
                    nom: "BURTON",
                    prenom: "Sean",
                    email: "sean.burton@draeger.com",
                    pin: "0514"
                });
            }
        });
    }

    function showAuth(t) {
        ['auth-login','auth-register','auth-reset'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('auth-' + t).style.display = 'block';
    }

    function handleAuth() {
        const uId = document.getElementById('loginUser').value.trim().toLowerCase();
        const pin = document.getElementById('loginPin').value;
        if(!uId || !pin) return;

        db.ref('users/' + uId).once('value', snap => {
            const data = snap.val();
            if(data && data.pin === pin) {
                user = { id: uId, ...data };
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'block';
                document.getElementById('pdf-user-display').innerText = `${user.nom}, ${user.prenom}`;
                initDataSync();
            } else alert("Utilisateur ou PIN incorrect.");
        });
    }

    function handleRegister() {
        const nom = document.getElementById('regNom').value.trim().toUpperCase();
        const prenom = document.getElementById('regPrenom').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const uId = document.getElementById('regUser').value.trim().toLowerCase();
        const pin = document.getElementById('regPin').value;

        if(!nom || !prenom || !email || !uId || pin.length < 4) return alert("Remplissez tout.");

        db.ref('users/' + uId).once('value', snap => {
            if(snap.exists()) return alert("Cet utilisateur existe déjà.");
            db.ref('users/' + uId).set({ nom, prenom, email, pin }, (err) => {
                if(!err) { alert("Compte créé !"); showAuth('login'); }
            });
        });
    }

    function handleReset() {
        const uId = document.getElementById('resetUser').value.trim().toLowerCase();
        const email = document.getElementById('resetEmail').value.trim();
        const nom = document.getElementById('resetNom').value.trim().toUpperCase();
        const nPin = document.getElementById('resetPin').value;

        db.ref('users/' + uId).once('value', snap => {
            const d = snap.val();
            if(d && d.email === email && d.nom === nom) {
                db.ref('users/' + uId + '/pin').set(nPin);
                alert("PIN réinitialisé !");
                showAuth('login');
            } else alert("Données non concordantes.");
        });
    }

    function initDataSync() {
        db.ref('users/' + user.id + '/entries').on('value', snap => {
            entries = snap.val() ? Object.values(snap.val()) : [];
            renderTable();
        });
    }

    function softLogout() { location.reload(); }

    async function saveData() {
        const d = document.getElementById('dateInput').value;
        const s = document.getElementById('startTime').value;
        const e = document.getElementById('endTime').value;
        const l = document.getElementById('location').value;
        if(!d) return;
        const [h1, m1] = s.split(':').map(Number);
        const [h2, m2] = e.split(':').map(Number);
        let min = (h2 * 60 + m2) - (h1 * 60 + m1) - (l === "Wemmel" ? 45 : 30);
        await db.ref('users/'+user.id+'/entries/'+d.replace(/-/g, '')).set({ date: d, location: l, minutes: min, start: s, end: e, isVacation: false });
        alert("Enregistré !");
    }

    async function saveVacation() {
        const sD = new Date(document.getElementById('vacStart').value);
        const eD = new Date(document.getElementById('vacEnd').value);
        const cat = document.getElementById('vacCategory').value;
        let curr = new Date(sD);
        while(curr <= eD) {
            if(curr.getDay() !== 0 && curr.getDay() !== 6) {
                const ds = curr.toISOString().split('T')[0];
                await db.ref('users/'+user.id+'/entries/'+ds.replace(/-/g, '')).set({ date: ds, location: cat, minutes: (curr.getDay() === 5 ? 420 : 480), isVacation: true });
            }
            curr.setDate(curr.getDate() + 1);
        }
        alert("Congés encodés !");
    }

    function renderTable() {
        const m = parseInt(document.getElementById('selectMonth').value);
        const y = parseInt(document.getElementById('selectYear').value);
        const tBody = document.getElementById('tableBody'); tBody.innerHTML = '';
        const months = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
        document.getElementById('pdf-title-date').innerText = `Résumé du mois de ${months[m]} ${y}`;

        let tPreste = 0, tSupp = 0, vMois = 0, weekWork = 0;
        const now = new Date();
        const curMon = new Date(now); curMon.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1)); curMon.setHours(0,0,0,0);
        const curSun = new Date(curMon); curSun.setDate(curMon.getDate() + 6);

        const days = new Date(y, m + 1, 0).getDate();
        for (let i = 1; i <= days; i++) {
            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const dobj = new Date(y, m, i);
            const e = entries.find(x => x.date === ds);
            const goal = (dobj.getDay() >= 1 && dobj.getDay() <= 4) ? 480 : (dobj.getDay() === 5 ? 420 : 0);
            
            if(e) {
                tPreste += e.minutes;
                tSupp += (e.minutes - goal);
                if(e.isVacation) vMois++;
                if(dobj >= curMon && dObj <= curSun) weekWork += e.minutes;
            }

            tBody.innerHTML += `<tr class="${(dobj.getDay()==0||dobj.getDay()==6)?'weekend':''}">
                <td>${String(i).padStart(2,'0')}/${String(m+1).padStart(2,'0')}</td>
                <td>${e ? `<b>${e.location}</b>` : ''}</td>
                <td>${e ? formatT(e.minutes) : ''}</td>
                <td style="color:${(e && e.minutes-goal>=0)?'var(--success)':'var(--danger)'}">${e ? formatT(e.minutes-goal) : ''}</td>
                <td class="delete-col">${e ? `<span onclick="deleteEntry('${e.date}')" style="cursor:pointer;">🗑️</span>` : ''}</td>
            </tr>`;
        }
        document.getElementById('stat-month-over').innerText = formatT(tSupp);
        document.getElementById('stat-month-vac').innerText = vMois;
        document.getElementById('stat-remaining-ptr').innerText = (2340 - weekWork <= 0) ? "OK" : formatT(2340 - weekWork);
        document.getElementById('pdf-total-preste').innerText = formatT(tPreste);
        document.getElementById('pdf-total-supp').innerText = formatT(tSupp);
    }

    async function deleteEntry(k) { if(confirm("Supprimer ?")) await db.ref('users/'+user.id+'/entries/'+k.replace(/-/g, '')).remove(); }
    function formatT(min) { const h = Math.floor(Math.abs(min)/60); const m = Math.round(Math.abs(min)%60); return `${min < 0 ? '-' : ''}${h}h${m.toString().padStart(2, '0')}`; }
    function openTab(id, btn) { document.querySelectorAll('.content').forEach(c => c.style.display = 'none'); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id).style.display = 'block'; btn.classList.add('active'); renderTable(); }
    function switchSubTab(t) { document.getElementById('form-work').style.display = t === 'work' ? 'block' : 'none'; document.getElementById('form-vacation').style.display = t === 'vacation' ? 'block' : 'none'; }
    
    function initApp() {
        checkSeanAccount(); // Initialise ton compte au chargement
        const mSel = document.getElementById('selectMonth');
        ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"].forEach((n, i) => mSel.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${n}</option>`);
        const ySel = document.getElementById('selectYear');
        for(let y = 2020; y <= 2100; y++) ySel.innerHTML += `<option value="${y}" ${y==new Date().getFullYear()?'selected':''}>${y}</option>`;
        const vCat = document.getElementById('vacCategory');
        ["Congés légaux", "Jour férié", "Jour reporté", "Malade"].forEach(c => vCat.innerHTML += `<option value="${c}">${c}</option>`);
    }
</script>
</body>
</html>
