<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dräger WorkLog V20</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #003366; --secondary: #3498db; --bg: #f0f2f5; --danger: #e74c3c; --success: #27ae60; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* INTERFACE APPLI */
        #login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; }
        .container { padding: 20px 15px 120px 15px; max-width: 600px; margin: auto; display: none; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 10px; background: #fff; }
        
        .check-row { display: flex; flex-direction: column; gap: 10px; background: #eef2f7; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .check-item { display: flex; align-items: center; cursor: pointer; }
        .check-item input { width: 25px; height: 25px; margin-right: 12px; flex-shrink: 0; }
        
        .btn-main { width: 100%; background: var(--secondary); color: white; padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .info-week { background: var(--primary); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: center; }
        .info-week b { font-size: 1.6em; display: block; }
        
        .tabs { display: flex; background: white; position: fixed; bottom: 0; left: 0; right: 0; padding: 10px; border-top: 1px solid #ccc; z-index: 1000; }
        .tab { flex: 1; border: none; background: none; font-size: 11px; color: #888; text-align: center; }
        .tab.active { color: var(--secondary); font-weight: bold; }
        
        .filter-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .stat-banner { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: white; padding: 12px; border-radius: 15px; text-align: center; font-size: 0.8em; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
        th, td { padding: 10px 5px; text-align: center; border-bottom: 1px solid #eee; }
        .weekend { color: #ccc; background: #f9f9f9; }

        /* --- STYLES POUR L'IMPRESSION PDF --- */
        #print-header { display: none; } /* Caché sur l'appli */

        @media print {
            body { background: white; }
            .tabs, .export-bar, .filter-row, .stat-banner, .btn-main, #txt-btn-save, .btn-exp, .delete-col, #login-overlay, .info-week { 
                display: none !important; 
            }
            .container { display: block !important; padding: 0; margin: 0; width: 100%; max-width: 100%; }
            .card { box-shadow: none; padding: 0; border: none; }
            
            #print-header { 
                display: block; 
                margin-bottom: 30px; 
                line-height: 1.4;
            }
            #print-header h1 { font-size: 1.4em; margin: 0; }
            #print-header p { margin: 2px 0; color: #333; }
            #print-header .report-title { 
                margin-top: 20px; 
                font-weight: bold; 
                text-decoration: underline; 
                font-size: 1.1em;
            }

            table { font-size: 10pt; width: 100%; border: 1px solid #000; }
            th { background-color: #f2f2f2 !important; color: black !important; border: 1px solid #000; }
            td { border: 1px solid #000; }
            .weekend { background-color: #f9f9f9 !important; -webkit-print-color-adjust: exact; }
            
            .print-footer { 
                margin-top: 20px; 
                text-align: right; 
                font-weight: bold; 
                font-size: 1.1em;
            }
            .delete-col { display: none; } /* Cache l'icône poubelle au PDF */
        }
    </style>
</head>
<body onload="initApp()">

<div id="print-header">
    <h1>Burton, Sean</h1>
    <p>Service Engineer - Logistic Support RSS</p>
    <p class="report-title" id="pdf-month-title">Résumé du mois</p>
</div>

<div id="login-overlay">
    <div class="box">
        <h2>Dräger RSS</h2>
        <input type="text" id="userInput" placeholder="Utilisateur">
        <input type="password" id="userPin" maxlength="4" placeholder="PIN">
        <button class="btn-main" onclick="handleAuth()">Connexion</button>
    </div>
</div>

<div class="container" id="mainContainer">
    <div id="saisie" class="content active">
        <div class="export-bar" style="display:flex; justify-content:space-between; margin-bottom:15px;">
             <button onclick="softLogout()" class="btn-exp" style="background:#eee;">Logout</button>
             <button class="btn-exp btn-lang" onclick="toggleLang()">🌐</button>
        </div>
        <div class="info-week">
            <span id="txt-rem-label">Reste à prester (Semaine)</span>
            <b id="stat-remaining-ptr">--h--</b>
        </div>
        <div class="card">
            <label id="txt-lbl-date">Date</label>
            <input type="date" id="dateInput">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label id="txt-lbl-start">Début</label><input type="time" id="startTime" value="08:00"></div>
                <div style="flex:1;"><label id="txt-lbl-end">Fin</label><input type="time" id="endTime" value="16:30"></div>
            </div>
            <div class="check-row">
                <div class="check-item" onclick="document.getElementById('homeStart').click()">
                    <input type="checkbox" id="homeStart" onclick="event.stopPropagation()">
                    <label id="txt-lbl-hs">🏠 Départ Maison (+30m)</label>
                </div>
                <div class="check-item" onclick="document.getElementById('homeEnd').click()">
                    <input type="checkbox" id="homeEnd" onclick="event.stopPropagation()">
                    <label id="txt-lbl-he">🏠 Retour Maison (+30m)</label>
                </div>
            </div>
            <label id="txt-lbl-loc">Lieu</label>
            <select id="location">
                <option value="Wemmel">Wemmel (-45m pause)</option>
                <option value="Client">Client (-30m pause)</option>
                <option value="INEOS">INEOS (-30m pause)</option>
                <option value="Esso">Esso (-30m pause)</option>
            </select>
            <button class="btn-main" id="txt-btn-save" onclick="saveData()">Enregistrer</button>
        </div>
    </div>

    <div id="historique" class="content" style="display:none;">
        <div class="export-bar" style="margin-bottom:15px;">
            <button class="btn-exp" id="txt-btn-print" onclick="window.print()">🖨️ PDF / Imprimer</button>
        </div>
        <div class="stat-banner">
            <div class="stat-box"><span id="txt-stat-bal">Balance Mois</span><b id="stat-balance">--</b></div>
            <div class="stat-box"><span>Congés</span><b>28</b></div>
        </div>
        <div class="card">
            <div class="filter-row">
                <select id="selectMonth" onchange="renderTable()"></select>
                <select id="selectYear" onchange="renderTable()"></select>
            </div>
            <table>
                <thead>
                    <tr id="txt-table-head">
                        <th>Date</th>
                        <th style="text-align:left;">Lieu & Travail</th>
                        <th>Réel</th>
                        <th>+/-</th>
                        <th class="delete-col"></th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="print-footer" id="pdf-totals">
                Total Mois: 0h00 | Total Supp: 0h00
            </div>
        </div>
    </div>
</div>

<nav class="tabs">
    <button class="tab active" id="txt-nav-ptr" onclick="openTab('saisie', this)">➕ Pointer</button>
    <button class="tab" id="txt-nav-cal" onclick="openTab('historique', this)">📅 Calendrier</button>
</nav>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBPC6cJgFwBrSOppxE_kQDA2gs1ioEvGCw", authDomain: "worklog-fc54b.firebaseapp.com", databaseURL: "https://worklog-fc54b-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "worklog-fc54b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let entries = [];
    let currentUserId = "";
    let lang = localStorage.getItem('lang') || 'fr';

    const ui = {
        fr: {
            rem_label: "Reste à prester (Semaine)", lbl_date: "Date", lbl_start: "Début", lbl_end: "Fin", 
            lbl_hs: "🏠 Départ Maison (+30m)", lbl_he: "🏠 Retour Maison (+30m)", lbl_loc: "Lieu", 
            btn_save: "Enregistrer", btn_print: "🖨️ Imprimer PDF", stat_bal: "Balance Mois",
            nav_ptr: "➕ Pointer", nav_cal: "📅 Calendrier", 
            table_head: "<th>Date</th><th style='text-align:left;'>Lieu & Travail</th><th>Réel</th><th>+/-</th><th class='delete-col'></th>",
            pdf_res: "Résumé du mois de", pdf_total: "Total Mois", pdf_supp: "Total Supp",
            save_ok: "Enregistré !", del_confirm: "Supprimer ?", confirm_calc: "Total : {t} - Confirmer ?"
        },
        nl: {
            rem_label: "Nog te presteren (Week)", lbl_date: "Datum", lbl_start: "Start", lbl_end: "Einde", 
            lbl_hs: "🏠 Vertrek Huis (+30m)", lbl_he: "🏠 Terug Huis (+30m)", lbl_loc: "Locatie", 
            btn_save: "Opslaan", btn_print: "🖨️ PDF afdrukken", stat_bal: "Maand Balans",
            nav_ptr: "➕ Invoer", nav_cal: "📅 Kalender", 
            table_head: "<th>Datum</th><th style='text-align:left;'>Locatie & Werk</th><th>Echt</th><th>+/-</th><th class='delete-col'></th>",
            pdf_res: "Maandoverzicht van", pdf_total: "Totaal Maand", pdf_supp: "Totaal Extra",
            save_ok: "Opgeslagen!", del_confirm: "Verwijderen ?", confirm_calc: "Totaal : {t} - Bevestigen ?"
        }
    };

    function translateUI() {
        const t = ui[lang];
        document.getElementById('txt-rem-label').innerText = t.rem_label;
        document.getElementById('txt-lbl-date').innerText = t.lbl_date;
        document.getElementById('txt-lbl-start').innerText = t.lbl_start;
        document.getElementById('txt-lbl-end').innerText = t.lbl_end;
        document.getElementById('txt-lbl-hs').innerText = t.lbl_hs;
        document.getElementById('txt-lbl-he').innerText = t.lbl_he;
        document.getElementById('txt-lbl-loc').innerText = t.lbl_loc;
        document.getElementById('txt-btn-save').innerText = t.btn_save;
        document.getElementById('txt-btn-print').innerText = t.btn_print;
        document.getElementById('txt-stat-bal').innerText = t.stat_bal;
        document.getElementById('txt-nav-ptr').innerText = t.nav_ptr;
        document.getElementById('txt-nav-cal').innerText = t.nav_cal;
        document.getElementById('txt-table-head').innerHTML = t.table_head;
        updateMonthAndYearSelectors();
    }

    function initApp() {
        const last = localStorage.getItem('lastLoggedUser');
        if(last) document.getElementById('userInput').value = last;
        document.getElementById('dateInput').valueAsDate = new Date();
        translateUI();
    }

    function handleAuth() {
        const u = document.getElementById('userInput').value.trim().toLowerCase();
        if(!u) return;
        currentUserId = u;
        localStorage.setItem('lastLoggedUser', u);
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('mainContainer').style.display = 'block';
        loadData();
    }

    function loadData() {
        db.ref('users/' + currentUserId + '/entries').on('value', (snap) => {
            entries = snap.val() ? Object.values(snap.val()) : [];
            renderTable();
        });
    }

    async function saveData() {
        const dateStr = document.getElementById('dateInput').value;
        if(!dateStr) return;
        const sTime = document.getElementById('startTime').value;
        const eTime = document.getElementById('endTime').value;
        const [h1, m1] = sTime.split(':').map(Number);
        const [h2, m2] = eTime.split(':').map(Number);
        const loc = document.getElementById('location').value;
        const isHS = document.getElementById('homeStart').checked;
        const isHE = document.getElementById('homeEnd').checked;

        let finalMin = (h2 * 60 + m2) - (h1 * 60 + m1) - (loc === "Wemmel" ? 45 : 30) - (isHS ? 30 : 0) - (isHE ? 30 : 0);

        if(confirm(ui[lang].confirm_calc.replace('{t}', formatT(finalMin)))) {
            const key = dateStr.replace(/-/g, '');
            await db.ref('users/'+currentUserId+'/entries/'+key).set({
                date: dateStr, location: loc, minutes: finalMin, homeS: isHS, homeE: isHE, start: sTime, end: eTime
            });
            alert(ui[lang].save_ok);
        }
    }

    function renderTable() {
        const selMonth = parseInt(document.getElementById('selectMonth').value || new Date().getMonth());
        const selYear = parseInt(document.getElementById('selectYear').value || new Date().getFullYear());
        const tBody = document.getElementById('tableBody'); tBody.innerHTML = '';
        let totalMonthMin = 0; let totalSuppMin = 0; let weekWork = 0;
        
        const now = new Date();
        const curMon = new Date(now); curMon.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
        curMon.setHours(0,0,0,0);
        const curSun = new Date(curMon); curSun.setDate(curMon.getDate() + 6);

        // Mettre à jour le titre PDF
        const mNames = lang === 'fr' ? ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"] : ["Januari", "Februari", "Maart", "April", "Mei", "Juni", "Juli", "Augustus", "September", "Oktober", "November", "December"];
        document.getElementById('pdf-month-title').innerText = `${ui[lang].pdf_res} ${mNames[selMonth]} ${selYear}`;

        const days = new Date(selYear, selMonth + 1, 0).getDate();
        for (let i = 1; i <= days; i++) {
            const dStr = `${selYear}-${String(selMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const dObj = new Date(selYear, selMonth, i);
            const e = entries.find(x => x.date === dStr);
            const dayIdx = dObj.getDay(); 
            let goal = (dayIdx >= 1 && dayIdx <= 4) ? 480 : (dayIdx === 5 ? 420 : 0);
            let diff = e ? e.minutes - goal : 0;
            
            if(e) { 
                totalMonthMin += e.minutes;
                totalSuppMin += diff;
                if(dObj >= curMon && dObj <= curSun) weekWork += e.minutes;
            }
            const isWE = (dayIdx === 0 || dayIdx === 6);
            
            // Format Date JJ/MM/AAAA
            const dateFormatted = `${String(i).padStart(2,'0')}/${String(selMonth+1).padStart(2,'0')}/${selYear}`;
            
            let displayRange = '';
            if(e && e.start && e.end) {
                let [h1, m1] = e.start.split(':').map(Number);
                let [h2, m2] = e.end.split(':').map(Number);
                let workStartMin = (h1 * 60 + m1) + (e.homeS ? 30 : 0);
                let workEndMin = (h2 * 60 + m2) - (e.homeE ? 30 : 0);
                displayRange = ` (${Math.floor(workStartMin/60).toString().padStart(2,'0')}:${(workStartMin%60).toString().padStart(2,'0')} - ${Math.floor(workEndMin/60).toString().padStart(2,'0')}:${(workEndMin%60).toString().padStart(2,'0')})`;
            }
            
            tBody.innerHTML += `<tr class="${isWE ? 'weekend' : ''}">
                <td>${dateFormatted}</td>
                <td style="text-align:left;">${e ? e.location + displayRange : ''}</td>
                <td><b>${e ? formatT(e.minutes) : ''}</b></td>
                <td style="color:${diff >= 0 ? 'green' : 'red'}">${e ? formatT(diff) : ''}</td>
                <td class="delete-col">${e ? `<span onclick="deleteEntry('${e.date}')" style="cursor:pointer; color:red;">🗑️</span>` : ''}</td>
            </tr>`;
        }
        
        document.getElementById('stat-remaining-ptr').innerText = (2340 - weekWork) <= 0 ? "Objectif ✅" : formatT(2340 - weekWork);
        document.getElementById('stat-balance').innerText = formatT(totalSuppMin);
        document.getElementById('pdf-totals').innerText = `${ui[lang].pdf_total}: ${formatT(totalMonthMin)} | ${ui[lang].pdf_supp}: ${formatT(totalSuppMin)}`;
    }

    async function deleteEntry(dateKey) {
        if(confirm(ui[lang].del_confirm)) {
            await db.ref('users/'+currentUserId+'/entries/'+dateKey.replace(/-/g, '')).remove();
        }
    }

    function formatT(min) {
        const h = Math.floor(Math.abs(min)/60);
        const m = Math.round(Math.abs(min)%60);
        return `${min < 0 ? '-' : ''}${h}h${m.toString().padStart(2, '0')}`;
    }

    function openTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).style.display = 'block'; btn.classList.add('active');
    }
    
    function softLogout() { document.getElementById('mainContainer').style.display='none'; document.getElementById('login-overlay').style.display='flex'; }

    function updateMonthAndYearSelectors() {
        const mFr = ["Jan", "Fév", "Mar", "Avr", "Mai", "Jui", "Jul", "Aoû", "Sep", "Oct", "Nov", "Déc"];
        const mNl = ["Jan", "Feb", "Maa", "Apr", "Mei", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dec"];
        const mSel = document.getElementById('selectMonth');
        const currentM = mSel.value || new Date().getMonth();
        mSel.innerHTML = '';
        (lang === 'fr' ? mFr : mNl).forEach((n, i) => mSel.innerHTML += `<option value="${i}" ${i==currentM?'selected':''}>${n}</option>`);

        const ySel = document.getElementById('selectYear');
        const currentY = parseInt(ySel.value) || new Date().getFullYear();
        ySel.innerHTML = '';
        for(let y = 2020; y <= 2100; y++) ySel.innerHTML += `<option value="${y}" ${y==currentY?'selected':''}>${y}</option>`;
    }

    window.toggleLang = function() {
        lang = (lang === 'fr' ? 'nl' : 'fr');
        localStorage.setItem('lang', lang);
        translateUI();
        renderTable();
    }
</script>
</body>
</html>
